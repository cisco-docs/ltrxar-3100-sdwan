policy_objects_app_probe_class:
  name: regex('^[A-Za-z0-9-_]{1,128}$')
  forwarding_class: regex('^[^<>!&$@\\\/"() ]{1,128}$')
  mappings: list(include("policy_objects_app_probe_class_mapping"))
