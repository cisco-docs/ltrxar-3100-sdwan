# SDWAN-as-code YAML schema
sdwan: include('sdwan', required=False)
---
sdwan:
  edge_feature_templates: include("edge_feature_templates", required=False)
  policy_objects: include("policy_objects", required=False)
  localized_policies: include("localized_policies", required=False)
  edge_device_templates: list(include("edge_device_templates"), required=False)
  sites: list(include("sites"), required=False)
  multi_region_fabric: include("multi_region_fabric", required=False)
  centralized_policies: include("centralized_policies", required=False)
  feature_profiles: include("feature_profiles", required=False)
  security_policies: include("security_policies", required=False)
# Edge Feature Templates
edge_feature_templates:
  aaa_templates: list(include("edge_feature_templates_aaa"), required=False)
  banner_templates: list(include("edge_feature_templates_banner"), required=False)
  bfd_templates: list(include("edge_feature_templates_bfd"), required=False)
  bgp_templates: list(include("edge_feature_templates_bgp"), required=False)
  cli_templates: list(include("edge_feature_templates_cli"), required=False)
  dhcp_server_templates: list(include("edge_feature_templates_dhcp_server"), required=False)
  ethernet_interface_templates: list(include("edge_feature_templates_ethernet_interface"), required=False)
  global_settings_templates: list(include("edge_feature_templates_global_settings"), required=False)
  ipsec_interface_templates: list(include("edge_feature_templates_ipsec_interface"), required=False)
  logging_templates: list(include("edge_feature_templates_logging"), required=False)
  ntp_templates: list(include("edge_feature_templates_ntp"), required=False)
  omp_templates: list(include("edge_feature_templates_omp"), required=False)
  ospf_templates: list(include("edge_feature_templates_ospf"), required=False)
  secure_internet_gateway_templates: list(include("edge_feature_templates_secure_internet_gateway"), required=False)
  security_templates: list(include("edge_feature_templates_security"), required=False)
  sig_credentials_templates: list(include("edge_feature_templates_sig_credentials"), required=False)
  snmp_templates: list(include("edge_feature_templates_snmp"), required=False)
  svi_interface_templates: list(include("edge_feature_templates_svi_interface"), required=False)
  switchport_templates: list(include("edge_feature_templates_switchport"), required=False)
  system_templates: list(include("edge_feature_templates_system"), required=False)
  thousandeyes_templates: list(include("edge_feature_templates_thousandeyes"), required=False)
  vpn_templates: list(include("edge_feature_templates_vpn"), required=False)
