  secondary_colors: list(enum("default", "mpls", "metro-ethernet", "biz-internet", "public-internet", "lte", "3g", "red", "green", "blue", "gold", "silver", "bronze", "custom1", "custom2", "custom3", "private1", "private2", "private3", "private4", "private5", "private6"), required=False)
  secondary_path: enum("direct-path", "multi-hop-path", "all-paths", required=False)
  tertiary_colors: list(enum("default", "mpls", "metro-ethernet", "biz-internet", "public-internet", "lte", "3g", "red", "green", "blue", "gold", "silver", "bronze", "custom1", "custom2", "custom3", "private1", "private2", "private3", "private4", "private5", "private6"), required=False)
  tertiary_path: enum("direct-path", "multi-hop-path", "all-paths", required=False)
policy_objects_region_list:
  name: regex('^[A-Za-z0-9-_]{1,128}$')
