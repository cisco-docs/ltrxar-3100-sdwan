  udp-timeout: int(min=1, max=8947, required=False)
cft_vpn_interface_natpool:
  prefix-length: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=30))
  range-end: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4))
  range-start: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4))
cft_vpn_interface_rewrite_rule:
  rule-name: any(str(starts_with="DEVICE_VARIABLE;"), str(max=128))
cft_vpn_interface_trustsec:
  enable: enum("true", "false")
  propagate: include("cft_vpn_interface_trustsec_propagate", required=False)
  static: include("cft_vpn_interface_trustsec_static", required=False)
cft_vpn_interface_trustsec_propagate:
  sgt: enum("true", "false")
cft_vpn_interface_trustsec_static:
  sgt: int(min=2, max=65519)
  trusted: enum("true", "false")
cft_vpn_interface_tunnel:
  allow-service: include("cft_vpn_interface_tunnel_allow", required=False)
  clear-dont-fragment: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  color: include("cft_vpn_interface_tunnel_color", required=False)
  core-region: any(str(starts_with="DEVICE_VARIABLE;"), enum("core", "core-shared"), required=False)
  enable-core-region: enum("true", "false", required=False)
  encapsulation: list(include("cft_vpn_interface_tunnel_encap"), min=1, max=1, required=False)
  group: any(str(starts_with="DEVICE_VARIABLE;"), list(int(min=1, max=4294967295)), required=False)
  hello-interval: int(min=100, max=600000, required=False)
  hello-tolerance: int(min=12, max=6000, required=False)
  max-control-connections: any(str(starts_with="DEVICE_VARIABLE;"), int(min=0, max=100), required=False)
  port-hop: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  propagate-sgt: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  secondary-region: any(str(starts_with="DEVICE_VARIABLE;"), enum("off", "secondary-only", "secondary-shared"), required=False)
  tunnel-qos: include("cft_vpn_interface_tunnel_qos", required=False)
  vmanage-connection-preference: any(str(starts_with="DEVICE_VARIABLE;"), int(min=0, max=8), required=False)
cft_vpn_interface_tunnel_allow:
  all: enum("true", "false", required=False)
  bgp: enum("true", "false", required=False)
  dhcp: enum("true", "false", required=False)
  dns: enum("true", "false", required=False)
  https: enum("true", "false", required=False)
  icmp: enum("true", "false", required=False)
  netconf: enum("true", "false", required=False)
  ntp: enum("true", "false", required=False)
  ospf: enum("true", "false", required=False)
  sshd: enum("true", "false", required=False)
  snmp: enum("true", "false", required=False)
  stun: enum("true", "false", required=False)
cft_vpn_interface_tunnel_color:
  restrict: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  value: any(str(starts_with="DEVICE_VARIABLE;"), enum("3g", "biz-internet", "blue", "bronze", "custom1", "custom2", "custom3", "default", "gold", "green", "lte", "metro-ethernet", "mpls", "public-internet", "private1", "private2", "private3", "private4", "private5", "private6", "red", "silver"))
cft_vpn_interface_tunnel_encap:
  encap: enum("ipsec")
  preference: any(str(starts_with="DEVICE_VARIABLE;"),int(min=0, max=4294967295), required=False)
  weight: any(str(starts_with="DEVICE_VARIABLE;"),int(min=1, max=255), required=False)
cft_vpn_interface_tunnel_qos:
  mode: enum("hub", "spoke")
cft_vpn_interface_vrrp:
  grp-id: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=255))
  ipv4: include("cft_vpn_interface_vrrp_ipv4", required=False)
  optional: bool(required=False)
  priority: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=254))
  timer: any(str(starts_with="DEVICE_VARIABLE;"), int(min=100, max=40950), required=False)
  tloc-change-pref: enum("true", "false", required=False)
  track-omp: enum("true", "false", required=False)
  track-prefix-list: regex('^[a-zA-Z0-9-_]{,32}$', required=False)
  value: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=4294967295), required=False)
cft_vpn_interface_vrrp_ipv4:
  address: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4))
# Cisco VPN interface IPSec feature template
# IKE version 2
# Either tunnel-source or tunnel-source-interface must be provided
cisco_vpn_interface_ipsec_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_vpn_interface_ipsec_parameters", required=False)
cft_vpn_interface_ipsec_parameters:
  dead-peer-detection: include("cft_vpn_interface_ipsec_dpd", required=False)
  description: any(str(starts_with="DEVICE_VARIABLE;"), str(max=240), required=False)
  if-name: any(str(starts_with="DEVICE_VARIABLE;"), regex('^ipsec[0-9]{,3}$'))
  ike: include("cft_vpn_interface_ipsec_ike", required=False)
  ip: include("cft_vpn_interface_ipsec_ip", required=False)
  ipsec: include("cft_vpn_interface_ipsec_ipsec", required=False)
  mtu: any(str(starts_with="DEVICE_VARIABLE;"), int(min=68, max=9216), required=False)
  shutdown: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  tcp-mss-adjust: any(str(starts_with="DEVICE_VARIABLE;"), int(min=500, max=1460), required=False)
  tunnel-destination: any(str(starts_with="DEVICE_VARIABLE;"), str())
  tunnel-source: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4), required=False)
  tunnel-source-interface: any(str(starts_with="DEVICE_VARIABLE;"), str(), required=False)
cft_vpn_interface_ipsec_dpd:
  dpd-interval: any(str(starts_with="DEVICE_VARIABLE;"), int(min=10, max=3600), required=False)
  dpd-retries: any(str(starts_with="DEVICE_VARIABLE;"), int(min=2, max=60), required=False)
cft_vpn_interface_ipsec_ike:
  authentication-type: include("cft_vpn_interface_ipsec_ike_psk", required=False)
  ike-ciphersuite: enum("aes256-cbc-sha1", "aes256-cbc-sha2", "aes128-cbc-sha1", "aes128-cbc-sha2", required=False)
  ike-group: enum("2", "14", "15", "16", "19", "20", "21", "24", required=False)
  ike-rekey-interval: any(str(starts_with="DEVICE_VARIABLE;"), int(min=60, max=86400), required=False)
  ike-version: enum(2)
cft_vpn_interface_ipsec_ike_psk:
  pre-shared-key: include("cft_vpn_interface_ipsec_ike_psk_psk", required=False)
cft_vpn_interface_ipsec_ike_psk_psk:
  ike-local-id: any(str(starts_with="DEVICE_VARIABLE;"), str(max=63), required=False)
  ike-remote-id: any(str(starts_with="DEVICE_VARIABLE;"), str(max=63), required=False)
  pre-shared-secret: any(str(starts_with="DEVICE_VARIABLE;"), str(max=127), required=False)
cft_vpn_interface_ipsec_ip:
  address: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4), required=False)
cft_vpn_interface_ipsec_ipsec:
  ipsec-ciphersuite: any(str(starts_with="DEVICE_VARIABLE;"), enum("aes256-cbc-sha1", "aes256-cbc-sha384", "aes256-cbc-sha256", "aes256-cbc-sha512", "aes256-gcm", "null-sha1", "null-sha384", "null-sha256", "null-sha512"), required=False)
  ipsec-rekey-interval: any(str(starts_with="DEVICE_VARIABLE;"), int(min=120, max=2592000), required=False)
  ipsec-replay-window: any(str(starts_with="DEVICE_VARIABLE;"), int(min=64, max=4096), required=False)
  perfect-forward-secrecy: any(str(starts_with="DEVICE_VARIABLE;"), enum("group-1", "group-2", "group-5", "group-14", "group-15", "group-16", "group-19", "group-20", "group-21", "group-24", "none"), required=False)
# cEdge CLI feature template
cli_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
