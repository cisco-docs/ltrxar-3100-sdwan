# SDWAN-as-code YAML schema
sdwan: include('sdwan', required=False)
---
sdwan:
  vmanage: include("vmanage", required=False)
  cedge_feature_templates: include("cedge_feature_templates", required=False)
  policy_objects: include("policy_objects", required=False)
  localized_policies: include("localized_policies", required=False)
  cedge_device_templates: include("cedge_device_templates", required=False)
  sites: list(include("sites"), required=False)
  multi_region_fabric: include("multi_region_fabric", required=False)
  centralized_policies: include("centralized_policies", required=False) # new tree for centralized policy.
# vManage API settings
vmanage:
  vmanage_ip: ip()
  vmanage_user: str()
  vmanage_password: str()
# cEdge Feature Yemplate schema
cedge_feature_templates:
  cedge_aaa: list(include("cedge_aaa_template"), required=False)
  cedge_global: list(include("cedge_global_template"), required=False)
  cisco_banner: list(include("cisco_banner_template"), required=False)
  cisco_bfd: list(include("cisco_bfd_template"), required=False)
  cisco_bgp: list(include("cisco_bgp_template"), required=False)
  cisco_dhcp_server: list(include("cisco_dhcp_server_template"), required=False)
  cisco_logging: list(include("cisco_logging_template"), required=False)
  cisco_ntp: list(include("cisco_ntp_template"), required=False)
  cisco_omp: list(include("cisco_omp_template"), required=False)
  cisco_ospf: list(include("cisco_ospf_template"), required=False)
  cisco_secure_internet_gateway: list(include("cisco_sig_template"), required=False)
  cisco_security: list(include("cisco_security_template"), required=False)
  cisco_sig_credentials: list(include("cisco_sig_credentials_template"), required=False)
  cisco_snmp: list(include("cisco_snmp_template"), required=False)
  cisco_system: list(include("cisco_system_template"), required=False)
  cisco_thousandeyes: list(include("cisco_thousandeyes_template"), required=False)
  cisco_vpn: list(include("cisco_vpn_template"), required=False)
  cisco_vpn_interface: list(include("cisco_vpn_interface_template"), required=False)
  cisco_vpn_interface_ipsec: list(include("cisco_vpn_interface_ipsec_template"), required=False)
  cli-template: list(include("cli_template"), required=False)
# cEdge device types
cedge_device_types: enum("C8000V", "C8200-1N-4T", "C8200L-1N-4T", "C8300-1N1S-4T2X", "C8300-1N1S-6T", "C8300-2N2S-6T", "C8300-2N2S-4T2X", "C8500-12X4QC", "C8500-12X", "C8500-20X6C", "C8500L-8S4X", "ISR-4321", "ISR-4331", "ISR-4351", "ISR-4431", "ISR-4451-X", "ASR-1001-X", "ASR-1001-HX", "ASR-1002-HX", "ASR-1002-X")
# cEdge AAA feature template
# Supported: local users, RADIUS groups, TACACS groups
# Missing: Radius COA, Radius Trustsec, dot1x auth
cedge_aaa_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_aaa_parameters", required=False)
cft_aaa_parameters:
  accounting: include("cft_aaa_accounting", required=False)
  authorization: include("cft_aaa_authorization", required=False)
  radius: list(include("cft_aaa_radius_group"), required=False)
  server-auth-order: str(matches='^[A-Za-z0-9-_,]+$') # "local" or server group names, comma-separated
  tacacs: list(include("cft_aaa_tacacs_group"), required=False)
  user: list(include("cft_aaa_local_user")) # At least the local user "admin" must be defined
cft_aaa_accounting:
  accounting-rule: list(include("cft_aaa_accounting_rule"), min=1)
cft_aaa_accounting_rule:
  group: str(matches='^[A-Za-z0-9-_,]+$') # "local" or server group names, comma-separated
  level: enum("1", "15", required=False)
  method: enum("commands", "exec", "network", "system")
  rule-id: regex('^[0-9]{,32}$')
  start-stop: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"))
cft_aaa_authorization:
  authorization-config-commands: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  authorization-console: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  authorization-rule: list(include("cft_aaa_authorization_rule"), min=1)
cft_aaa_authorization_rule:
  group: str(matches='^[A-Za-z0-9-_,]+$') # "local" or server group names, comma-separated
  if-authenticated: enum("true", "false")
  level: enum("1", "15")
  method: enum("commands")
  rule-id: regex('^[0-9]{,32}$')
cft_aaa_local_user:
  name: str(max=64)
  password: str(starts_with="$6$") # Must be a SHA512 hash
  secret: str(starts_with="$9$") # Must be a Cisco Type 9 scrypt hash
  privilege: enum("1", "15")
  optional: bool(required=False)
cft_aaa_tacacs_group:
  group-name: str(min=1, max=32)
  server: list(include("cft_aaa_tacacs_server"), min=1, max=8)
  source-interface: any(str(starts_with="DEVICE_VARIABLE;"), str(), required=False)
  vpn: int(min=0, max=512, required=False) # default=0
cft_aaa_tacacs_server:
  address: ip(version=4)
  key: str(starts_with="$CRYPT_CLUSTER$", min=1, max=128) # vManage-encrypted string
  key-enum: int(equals=6, required=False)
  key-type: str(equals="key", required=False)
  secret-key: regex('^[0-9a-z]{,150}$') # Type-7 encrypted secret
  port: int(min=1, max=65535, required=False) # default=49
  timeout: int(min=1, max=1000, required=False) # default=5
cft_aaa_radius_group:
  group-name: str(min=1, max=32)
  server: list(include("cft_aaa_radius_server"), min=1, max=8)
  source-interface: any(str(starts_with="DEVICE_VARIABLE;"), str(), required=False)
  vpn: int(min=0, max=512, required=False) # default=0
cft_aaa_radius_server:
  address: ip(version=4)
  key: str(starts_with="$CRYPT_CLUSTER$", min=1, max=128) # vManage-encrypted string
  key-enum: int(equals=6, required=False)
  key-type: str(equlas="key", required=False)
  secret-key: regex('^[0-9a-z]{,150}$') # Type-7 encrypted secret
  auth-port: int(min=1, max=65535, required=False) # default=1812
  acct-port: int(min=1, max=65535, required=False) # default=1813
  timeout: int(min=1, max=1000, required=False) # default=5
  retransmit: int(min=1, max=100, required=False) # default=3
# cEdge Global Settings feature template
cedge_global_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_global_parameters", required=False)
cft_global_parameters:
  http-global: include("cft_global_http", required=False)
  nat64-global: include("cft_global_nat64", required=False)
  services-global: include("cft_global_services", required=False)
  ssh: include("cft_global_ssh", required=False)
cft_global_http:
  http-authentication: enum("local", "aaa", required=False)
cft_global_nat64:
  nat64-timeout: include("cft_global_nat64_timeout", required=False)
cft_global_nat64_timeout:
  udp-timeout: int(min=1, max=536870, required=False)
  tcp-timeout: int(min=1, max=536870, required=False)
cft_global_services:
  services-ip: include("cft_global_services_ip", required=False)
  services-other: include("cft_global_services_other", required=False)
cft_global_services_ip:
  arp-proxy: enum("true", "false", required=False)
  cdp: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  domain-lookup: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  ftp-passive: enum("true", "false", required=False)
  http-server: enum("true", "false", required=False)
  https-server: enum("true", "false", required=False)
  line-vty: enum("true", "false", required=False)
  lldp: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  rcmd: enum("true", "false", required=False)
  source-intrf: any(str(starts_with="DEVICE_VARIABLE;"), str(), required=False)
cft_global_services_other:
  bootp: enum("true", "false", required=False)
  console-logging: enum("true", "false", required=False)
  snmp-ifindex-persist: enum("true", "false", required=False)
  source-route: enum("true", "false", required=False)
  tcp-keepalives-in: enum("true", "false", required=False)
  tcp-keepalives-out: enum("true", "false", required=False)
  tcp-small-servers: enum("true", "false", required=False)
  udp-small-servers: enum("true", "false", required=False)
  vty-logging: enum("true", "false", required=False)
cft_global_ssh:
  version: enum(1, 2, required=False)
# Cisco banner feature template
cisco_banner_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_banner_parameters", required=False)
cft_banner_parameters:
  login: str(min=1, max=2048, required=False)
  motd: str(min=1, max=2048, required=False)
# Cisco BFD feature template
cisco_bfd_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_bfd_parameters", required=False)
cft_bfd_parameters:
  app-route: include("cft_bfd_approute", required=False)
  default-dscp: int(min=0, max=63, required=False)
  color: list(include("cft_bfd_color"), required=False)
cft_bfd_approute:
  multiplier: int(min=1, max=6, required=False)
  poll-interval: int(min=1, max=4294967295, required=False)
cft_bfd_color:
  color: enum("default", "mpls", "metro-ethernet", "biz-internet", "public-internet", "lte", "3g", "red", "green", "blue", "gold", "silver", "bronze", "custom1", "custom2", "custom3", "private1", "private2", "private3", "private4", "private5", "private6")
  hello-interval: int(min=100, max=300000, required=False)
  multiplier: int(min=1, max=60, required=False)
  pmtu-discovery: enum("true", "false", required=False)
  dscp: int(min=0, max=63, required=False)
# Cisco BGP feature template
cisco_bgp_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_bgp_parameters", required=False)
cft_bgp_parameters:
  bgp: include("cft_bgp")
cft_bgp:
  address-family: list(include("cft_bgp_address_family", required=False))
  as-num: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=4294967295))
  best-path: include("cft_bgp_best_path", required=False)
  distance: include("cft_bgp_distance", required=False)
  neighbor: list(include("cft_bgp_neighbor"), max=8, required=False)
  propagate-aspath: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  propagate-community: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  router-id: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4), required=False)
  shutdown: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  timers: include("cft_bgp_timers", required=False)
cft_bgp_address_family:
  aggregate-address: list(include("cft_bgp_af_aggregate_address"), min=1, required=False)
  default-information: include("cft_bgp_af_default_information", required=False)
  family-type: enum("ipv4-unicast")
  maximum-paths: include("cft_bgp_af_maximum_paths", required=False)
  redistribute: list(include("cft_bgp_redistribute_protocol"), required=False)
cft_bgp_af_aggregate_address:
  prefix: ip(version=4)
cft_bgp_af_default_information:
  originate: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
cft_bgp_af_maximum_paths:
  paths: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=32), required=False)
cft_bgp_redistribute_protocol:
  protocol: enum("connected", "eigrp", "nat", "omp", "ospf", "ospfv3", "static")
  route_policy: any(str(starts_with="DEVICE_VARIABLE;"), str(), required=False)
  optional: bool(required=False)
cft_bgp_best_path:
  as-path: include("cft_bgp_bp_aspath", required=False)
  compare-router-id: enum("true", "false", required=False)
  med: include("cft_bgp_bp_med", required=False)
cft_bgp_bp_aspath:
  multipath-relax: enum("true", "false")
cft_bgp_bp_med:
  always-compare: enum("true", "false")
  deterministic: enum("true", "false")
  missing-as-worst: enum("true", "false")
cft_bgp_distance:
  internal: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=255), required=False)
  external: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=255), required=False)
  local: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=255), required=False)
cft_bgp_neighbor:
  address: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4))
  address-family: list(include("cft_bgp_neighbor_address_family"), required=False)
  ebgp-multihop: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=255), required=False)
  next-hop-self: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  password: any(str(starts_with="DEVICE_VARIABLE;"), str(starts_with="$CRYPT_CLUSTER$", min=1, max=128), required=False)
  remote-as: any(str(starts_with="DEVICE_VARIABLE;"),  int(min=1, max=4294967295))
  shutdown: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  send-community: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  send-ext-community: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  timers: include("cft_bgp_timers", required=False)
  optional: bool(required=False)
cft_bgp_neighbor_address_family:
  family-type: enum("ipv4-unicast")
  maximum-prefixes: include("cft_bgp_neighbor_af_maximum_prefixes", required=False)
  route-policy: list(include("cft_bgp_neighbor_af_route_policy"), required=False)
cft_bgp_neighbor_af_maximum_prefixes:
  prefix-num: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=4294967295), required=False)
cft_bgp_neighbor_af_route_policy:
  direction: enum("in", "out")
  pol-name: any(str(starts_with="DEVICE_VARIABLE;"), str(), required=False)
cft_bgp_timers:
  keepalive: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=65535), required=False)
  holdtime: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=65535), required=False)
# Cisco DHCP server feature template
cisco_dhcp_server_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_dhcp_server_parameters", required=False)
cft_dhcp_server_parameters:
  address-pool: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4)) # CIDR prefix
  exclude: any(str(starts_with="DEVICE_VARIABLE;"), str()) # comma-separated IP address ranges, ex: 10.59.160.1,10.59.162.1-10.59.163.254
  lease-time: any(str(starts_with="DEVICE_VARIABLE;"), int(min=10, max=31536000))
  options: include("cft_dhcpserver_options")
  static-lease: list(include("cft_dhcpserver_static_lease"), min=1, required=False)
cft_dhcpserver_options:
  default-gateway: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4))
  dns-servers: any(str(starts_with="DEVICE_VARIABLE;"), str()) # comma-separated list of IP addresses
cft_dhcpserver_static_lease:
  ip: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4))
  mac-address: any(str(starts_with="DEVICE_VARIABLE;"), str())
  optional: bool(required=False)
# Cisco logging feature template
# Missing: TLS profiles for logging servers
cisco_logging_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_logging_parameters", required=False)
cft_logging_parameters:
  disk: include("cft_logging_disk", required=False)
  server: list(include("cft_logging_server"), required=False)
cft_logging_disk:
  enable: enum("true", "false")
  file: include("cft_logging_disk_file", required=False)
cft_logging_disk_file:
  rotate: int(min=1, max=10)
  size: int(min=1, max=20)
cft_logging_server:
  name: any(str(starts_with="DEVICE_VARIABLE;"), str(matches='^[a-z0-9.-]+$', max=255), ip(version=4))
  vpn: int(min=0, max=512)
  tls: include("cft_logging_server_tls", required=False)
  source-interface: any(str(starts_with="DEVICE_VARIABLE;"), str(), required=False)
  priority: enum("alert", "critical", "debugging", "emergency", "errors", "information", "notice", "warn", required=False)
  version: enum(4, required=False)
cft_logging_server_tls:
  enable-tls: enum("true", "false")
# Cisco NTP feature template
# Missing: authentication keys; ntp master
cisco_ntp_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_ntp_parameters", required=False)
cft_ntp_parameters:
  server: list(include("cft_ntp_server"), required=False)
cft_ntp_server:
  name: any(str(starts_with="DEVICE_VARIABLE;"), str(matches='^[a-z0-9.-]+$', max=255), ip(version=4))
  version: int(min=1, max=4, required=False)
  vpn: int(min=0, max=512, required=False)
  optional: bool(required=False)
  prefer: enum("true", "false", required=False)
  source-interface: any(str(), str(starts_with="DEVICE_VARIABLE;"), required=False)
# Cisco OMP feature template
cisco_omp_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_omp_parameters", required=False)
cft_omp_parameters:
  graceful-restart: enum("true", "false", required=False)
  overlay-as: int(min=1, max=4294967295, required=False)
  send-path-limit: int(min=1, max=16, required=False)
  ecmp-limit: int(min=1, max=16, required=False)
  shutdown: enum("true", "false", required=False)
  omp-admin-distance-ipv4: int(min=1, max=255, required=False)
  omp-admin-distance-ipv6: int(min=1, max=255, required=False)
  timers: include("cft_omp_timers", required=False)
  advertise: list(include("cft_omp_advertise_protocol"), required=False)
cft_omp_timers:
  graceful-restart-timer: int(min=1, max=604800, required=False)
  advertisement-interval: int(min=1, max=65535, required=False)
  holdtime: int(min=3, max=65535, required=False)
  eor-timer: int(min=1, max=604800, required=False)
cft_omp_advertise_protocol:
  protocol: enum("bgp", "ospf", "ospfv3", "connected", "static", "eigrp", "lisp", "isis")
# Cisco OSPF feature template
cisco_ospf_template:
  name: regex('^[^<>!&$@\/"() ]{,128}$')
  description: str()
  deviceType: list(include("cedge_device_types"), min=1, required=False)
  parameters: include("cft_ospf_parameters", required=False)
cft_ospf_parameters:
  ospf: include("cft_ospf", required=False)
cft_ospf:
  area: list(include("cft_ospf_area"), required=False)
  auto-cost: include("cft_ospf_auto_cost", required=False)
  compatible: include("cft_ospf_auto_compatible", required=False)
  default-information: include("cft_ospf_default_information", required=False)
  distance: include("cft_ospf_distance", required=False)
  redistribute: list(include("cft_ospf_redistribute"), required=False)
  router-id: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4), required=False)
  route-policy: list(include("cft_ospf_route_policy"), required=False)
  timers: include("cft_ospf_timers", required=False)
cft_ospf_area:
  a-num: any(str(starts_with="DEVICE_VARIABLE;"), int(min=0, max=4294967295))
  interface: list(include("cft_ospf_area_interface"), required=False)
  optional: bool(required=False)
  range: list(include("cft_ospf_area_range"), required=False)
cft_ospf_area_interface:
  authentication: include("cft_ospf_area_interface_authentication", required=False)
  cost: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=65535), required=False)
  dead-interval: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=65535), required=False)
  hello-interval: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=65535), required=False)
  name: any(str(starts_with="DEVICE_VARIABLE;"), str())
  network: any(str(starts_with="DEVICE_VARIABLE;"), enum("broadcast", "point-to-point", "non-broadcast", "point-to-multipoint"), required=False) # Network type
  passive-interface: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
  priority: any(str(starts_with="DEVICE_VARIABLE;"), int(min=0, max=255), required=False)
  retransmit-interval: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=65535), required=False)
cft_ospf_area_interface_authentication:
  message-digest: include("cft_ospf_area_interface_authentication_md", required=False)
  type: any(str(starts_with="DEVICE_VARIABLE;"), enum("message-digest", "null"), required=False)
cft_ospf_area_interface_authentication_md:
  md5: any(str(starts_with="DEVICE_VARIABLE;"), str(min=1, max=31), required=False)
  message-digest-key: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=255), required=False)
cft_ospf_area_range:
  address: any(str(starts_with="DEVICE_VARIABLE;"), ip(version=4))
  cost: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=16777214), required=False)
  no-advertise: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
cft_ospf_auto_cost:
  reference-bandwidth: any(str(starts_with="DEVICE_VARIABLE;"), int(min=1, max=4294967))
cft_ospf_auto_compatible:
  rfc1583: any(str(starts_with="DEVICE_VARIABLE;"), enum("true", "false"), required=False)
cft_ospf_default_information:
