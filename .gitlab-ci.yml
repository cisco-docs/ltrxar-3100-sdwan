---
image:
  name: danischm/nac:latest
  pull_policy: if-not-present

stages:
  - validate
  - plan
  - deploy
  - test
  - notify
  - destroy

variables:
  # Disable SSL verification for git operations
  GIT_SSL_NO_VERIFY: "true"

  SDWAN_USERNAME:
    description: "Cisco SDWAN Username"
  SDWAN_PASSWORD:
    description: "Cisco SDWAN Password"
  SDWAN_URL:
    description: "Cisco SDWAN URL"
  GITLAB_TOKEN:
    description: "User Access Token. Used to create comments on Merge Requests"
  TF_HTTP_USERNAME:
    description: "GitLab Username"
    value: "gitlab-ci-token"
  TF_HTTP_PASSWORD:
    description: "GitLab Access Token"
    value: "${GITLAB_TOKEN}"
  WEBEX_ROOM_ID:
    description: "Cisco Webex Room ID"
  WEBEX_TOKEN:
    description: "Cisco Webex Bot Token"
  GITLAB_API_URL:
    description: "GitLab API v4 root URL"
    value: "${CI_API_V4_URL}"

  # Per-branch Terraform state name
  TF_STATE_NAME:
    description: "Terraform state name (per branch)"
    value: "${CI_COMMIT_REF_SLUG}"

  TF_HTTP_ADDRESS:
    description: "GitLab HTTP Address to store the TF state file"
    value: "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
  TF_HTTP_LOCK_ADDRESS:
    description: "GitLab HTTP Address to lock the TF state file"
    value: "${TF_HTTP_ADDRESS}/lock"
  TF_HTTP_LOCK_METHOD:
    description: "Method to lock TF state file"
    value: POST
  TF_HTTP_UNLOCK_ADDRESS:
    description: "GitLab HTTP Address to unlock the TF state file"
    value: "${TF_HTTP_ADDRESS}/lock"
  TF_HTTP_UNLOCK_METHOD:
    description: "Method to unlock TF state file"
    value: DELETE

before_script:
  - update-ca-certificates
  - echo "http_proxy=$http_proxy"
  - echo "https_proxy=$https_proxy"
  - echo "NO_PROXY=$NO_PROXY"
  - echo "no_proxy=$no_proxy"
  - git config --global http.proxy "$http_proxy"
  - git config --global https.proxy "$https_proxy"

cache:
  key: terraform_modules_and_lock_v2
  paths:
    - .terraform
    - .terraform.lock.hcl
    - defaults.yaml

validate:
  stage: validate
  script:
    - set -o pipefail && terraform fmt -check |& tee fmt_output.txt
    - set -o pipefail && nac-validate ./data/ --rules ./validation/rules |& tee validate_output.txt
  artifacts:
    when: always
    paths:
      - fmt_output.txt
      - validate_output.txt
  cache: []
  rules:
    - if: $CI_COMMIT_TAG == null

plan:
  stage: plan
  resource_group: sdwan
  script:
    - terraform version
    - env | egrep -i 'http.*proxy|no_proxy' || true
    - git config --global --get http.proxy || true
    - git config --global --get https.proxy || true
    - terraform init -upgrade -input=false
    - terraform providers
    - terraform plan -out=plan.tfplan -input=false
    - terraform show -no-color plan.tfplan > plan.txt
    - terraform show -json plan.tfplan | jq > plan.json
    - terraform show -json plan.tfplan | jq '([.resource_changes[]?.change.actions?]|flatten)|{"create":(map(select(.=="create"))|length),"update":(map(select(.=="update"))|length),"delete":(map(select(.=="delete"))|length)}' > plan_gitlab.json
    - python3 .ci/gitlab-comment.py
  artifacts:
    paths:
      - plan.json
      - plan.txt
      - plan.tfplan
      - plan_gitlab.json
    reports:
      terraform: plan_gitlab.json
  dependencies: []
  needs:
    - validate
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^devhub\//'
      when: on_success
    - if: '$CI_COMMIT_BRANCH =~ /^devhub\//'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never

deploy:
  stage: deploy
  resource_group: sdwan
  when: manual
  allow_failure: false
  script:
    - export TF_LOG=DEBUG
    - export TF_LOG_PATH=terraform-debug.log
    - terraform apply -input=false -auto-approve plan.tfplan
    - echo "--- TF DEBUG LOG START ---"
    - cat terraform-debug.log || echo "No debug log found"
    - echo "--- TF DEBUG LOG END ---"
    - echo "--- TERRAFORM OUTPUTS ---"
    - terraform output > all_outputs.txt || echo "No outputs found"
  artifacts:
    paths:
      - defaults.yaml
      - terraform-debug.log
      - all_outputs.txt
    when: always
    expire_in: 1 week
  dependencies:
    - plan
  needs:
    - plan
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^devhub\//'
      when: manual
    - if: '$CI_COMMIT_BRANCH =~ /^devhub\//'
      when: manual
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never

test-integration:
  stage: test
  script:
    - set -o pipefail && nac-test -d ./data -d ./defaults -t ./templates/sdwan/test -f ./jinja_filters -o ./tests/results/sdwan |& tee test_output.txt
  artifacts:
    when: always
    paths:
      - tests/results/sdwan/*.html
      - tests/results/sdwan/xunit.xml
      - test_output.txt
    reports:
      junit: tests/results/sdwan/xunit.xml
  dependencies:
    - deploy
  needs:
    - deploy
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never

test-idempotency:
  stage: test
  resource_group: sdwan
  script:
    - terraform init -input=false
    - terraform plan -input=false -detailed-exitcode
  dependencies:
    - deploy
  needs:
    - deploy
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never

failure:
  stage: notify
  script:
    - python3 .ci/webex-notification-gitlab.py -f
  when: on_failure
  artifacts:
    when: always
    paths:
      - tests/results/sdwan/*.html
      - tests/results/sdwan/xunit.xml
      - plan.txt
      - fmt_output.txt
      - validate_output.txt
      - test_output.txt
  cache: []

success:
  stage: notify
  script:
    - python3 .ci/webex-notification-gitlab.py -s
  when: on_success
  artifacts:
    when: always
    paths:
      - tests/results/sdwan/*.html
      - tests/results/sdwan/xunit.xml
      - plan.txt
      - fmt_output.txt
      - validate_output.txt
      - test_output.txt
  cache: []

destroy:
  stage: destroy
  dependencies: []
  variables:
    TF_HTTP_PASSWORD: "${GITLAB_TOKEN}"
  script:
    - terraform init
    - terraform destroy -auto-approve
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^devhub\//'
      when: manual
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
