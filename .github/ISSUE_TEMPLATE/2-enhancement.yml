name: Enhancement Request
description: Template to submit a enhancement request against SDWAN as Code
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this enhancement request!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the enhancement is.
      placeholder: Tell us what you want to see!
    validations:
      required: true

  - type: input
    id: customer-name
    attributes:
      label: Associated Customer
      description: Provide customer name if applicable.
      placeholder: Customer name
    validations:
      required: false

  - type: dropdown
    id: services-as-code
    attributes:
      label: Is this a customer of Services as Code (LCS)?
      description: Is the issue opened for a customer with paid Services as Code support?
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true

  - type: input
    id: customer-pid
    attributes:
      label: Services as Code PID/DID
      description: For Services as Code customers, provide PID or deal ID to prioritize the issue.
      placeholder: Services as Code customer PID or deal ID
    validations:
      required: false
