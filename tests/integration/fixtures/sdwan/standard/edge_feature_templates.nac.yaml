    banner_templates:
      - name: FT-CEDGE-BANNER-01
        description: Banner template with Carriage return, Line Feed
        device_types:
          - C8000V
        login: "login banner: new\n"
        motd: "motd banner:\r\nNo message today\n"
      - name: FT-CEDGE-BANNER-02
        description: Banner template with Carriage return, Line Feed and horizontal tab
        login: "login banner: new\ttest\n"
        motd: "motd banner:\r\nNo message today\n"
      - name: FT-CEDGE-BANNER-03
        description: Banner template text only single line
        login: "login banner plain text"
        motd: "motd banner plain text"
      - name: FT-CEDGE-BANNER-04
        description: Banner template using variable references
        login_variable: login_banner_variable1
        motd_variable: motd_banner_variable1
      - name: FT-CEDGE-BANNER-05
        description: Typical Multiline banner using Carriage return, Line Feed
        login: "*************************************************************\n*************************************************************\n**\n** UNAUTHORIZED USE PROHIBITED\n** UNAUTHORIZED ACCESS PROHIBITED\n **\n** Log out immediately\n** XXXXXXXXXX\n **\n*************************************************************\n*************************************************************"
      - name: FT-CEDGE-BANNER-06
        description: "Multiline banner template example"
        login: |
          ***********************************************************
          ***********************************************************
          ** UNAUTHORIZED USE PROHIBITED
          ** UNAUTHORIZED ACCESS PROHIBITED
          **
          ** MANAGED BY:
          ** XXXXXXXXXX
          **
          ***********************************************************
          ***********************************************************
      - name: FT-CEDGE-BANNER-07
        description: Banner template with ASCII Carriage return, Line Feed and horizontal tab
        device_types:
          - C8000V
          - ISR-4331
        login: "Login**********************************************************************\x0d\x0aLogin next line"
        motd: "MOTD***************************************************************\x0D\x0AMOTD next\x09line"
    bfd_templates:
      - name: FT-CEDGE-BFD-01
        description: BFD base template
        colors:
          - color: custom1
          - color: custom2
          - color: private1
          - color: private2
      - name: FT-CEDGE-BFD-02
        description: BFD base  template double spaced description
        colors:
          - color: custom1
          - color: private2
    bgp_templates:
      - name: FT-CEDGE-BGP-VPN1-ACTIVE
        description: VPN 1 BGP
        ipv4_address_family:
          default_information_originate: false
          maximum_paths_variable: vpn1_bgp_ipv4_maximum_paths
          redistributes:
            - protocol: omp
              optional: false
              route_policy: RM-SITE-BGP-OUT-ACTIVE
          neighbors:
            - address_variable: vpn1_bgp_ipv4_neighbor1_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
              next_hop_self: false
              password_variable: vpn1_bgp_ipv4_neighbor1_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor1_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor1_shutdown
              optional: true
            - address_variable: vpn1_bgp_ipv4_neighbor2_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
              password_variable: vpn1_bgp_ipv4_neighbor2_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor2_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor2_shutdown
              optional: true
        as_number_variable: vpn1_bgp_as_number
        shutdown_variable: vpn1_bgp_shutdown
        holdtime: 3
        keepalive: 1
      - name: FT-CEDGE-BGP-VPN1-STANDBY
        description: VPN 1 BGP
        ipv4_address_family:
          default_information_originate: false
          maximum_paths_variable: vpn1_bgp_ipv4_maximum_paths
          redistributes:
            - protocol: omp
              optional: false
              route_policy: RM-SITE-BGP-OUT-STANDBY
          neighbors:
            - address_variable: vpn1_bgp_ipv4_neighbor1_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
              next_hop_self: false
              password_variable: vpn1_bgp_ipv4_neighbor1_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor1_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor1_shutdown
              optional: true
            - address_variable: vpn1_bgp_ipv4_neighbor2_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
                  route_policy_in: RM-SITE-BGP-OUT-STANDBY
                  route_policy_out: RM-SITE-BGP-OUT-ACTIVE
              password_variable: vpn1_bgp_ipv4_neighbor2_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor2_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor2_shutdown
              optional: true
        as_number_variable: vpn1_bgp_as_number
        shutdown_variable: vpn1_bgp_shutdown
        holdtime: 3
        keepalive: 1
    cli_templates:
      - name: FT-EDGE-CLI-LOGGING
        description: "Edge CLI Template to disable DAUTH logs"
        cli_config: |
          logging discriminator auth mnemonics drops AUTH_PASSED
          logging console discriminator auth
      - name: FT-EDGE-CLI-BGP
        description: "Edge CLI Template to set BGP local AS"
        cli_config: |
          ! This template is using variables
          router bgp {{bgp_as_number}}
            address-family ipv4 unicast vrf 10
            neighbor {{bgp_neighbor_ip}} local-as {{bgp_neighbor_local_as}}
          !
    dhcp_server_templates:
