        description: "Ethernet Interface Template"
        device_types:
          - ASR-1002-X
        vpn_qos_map_variable: qosmapvar1
        shaping_rate: 1000
        static_sgt: 11
        ipv6_address: 2000::1/64
        ipv6_dhcp_helpers:
          - address: 2001::2
            vpn_id: 1
          - address: 2001::3
            vpn_id_variable: ipv6dhcpvar1
        ipv6_secondary_addresses:
          - address: 2002::4/64
          - address_variable: ipv6secaddvar1
        ipv6_vrrp_groups:
          - id: 2
            global_prefix: 2000::3/64
            link_local_address: fe80::1
            priority: 101
            timer: 500
            track_prefix_list: tracklist1
          - id: 1
            global_prefix: 2000::4/64
            link_local_address: fe80::2
            priority: 103
            timer: 400
            track_omp: true
            optional: true
        interface_description: Ethernet1/0 description
        interface_name: GigabitEthernet0/1
        ipv4_address_dhcp: false
        ipv4_address: 192.168.1.2/24
        ipv4_dhcp_helpers:
          - 172.16.18.1
        block_non_source_ip: true
        bandwidth_upstream: 2000
        bandwidth_downstream: 2000
        bandwidth_auto_detect: true
        iperf_server: 10.1.1.1
        ipv4_nat: true
        ipv4_nat_overload: true
        ipv4_nat_pool_prefix_length: 16
        ipv4_nat_pool_range_end: 10.10.10.100
        ipv4_nat_pool_range_start: 10.10.10.1
        ipv4_nat_type: pool
        ipv4_nat_udp_timeout: 200
        ipv4_nat_tcp_timeout: 200
        ipv4_static_nat_rules:
          - optional: false
            source_ip: 10.1.1.1
            translate_ip: 10.2.2.2
            source_vpn_id: 2
          - source_ip: 10.0.0.1
            translate_ip: 10.0.0.3
            source_vpn_id: 1
        ipv4_port_forwarding_rules:
          - protocol: udp
            source_ip: 10.1.1.11
            source_port: 20
            translate_ip: 20.1.1.1
            translate_port: 2020
            source_vpn_id: 2
          - optional: false
            protocol: udp
            source_ip: 10.1.1.1
            source_port: 20
            translate_ip: 20.1.1.1
            translate_port: 2020
            source_vpn_id: 2
        ipv4_secondary_addresses:
