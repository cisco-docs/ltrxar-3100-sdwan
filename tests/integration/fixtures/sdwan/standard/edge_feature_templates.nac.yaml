        arp_timeout: 1200
        load_interval: 30
        icmp_redirect_disable: true
        shutdown_variable: vpn0_tloc01_if_shutdown
        adaptive_qos: true
        adaptive_qos_period: 60
        adaptive_qos_shaping_rate_downstream:
          default: 19
          maximum: 22
          minimum: 16
        adaptive_qos_shaping_rate_upstream:
          default: 19
          maximum: 22
          minimum: 16
        rewrite_rule: rule1
        ipv4_egress_access_list: egress1
        ipv4_ingress_access_list: ingress1
        ipv6_egress_access_list: ip6egress1
        ipv6_ingress_access_list: ip6ingress1
        enable_sgt: true
        sgt_propagation: true
        sgt_enforcement_tag: 3
        sgt_trusted: true
        sgt_enforcement: true
        duplex: auto
        mac_address: 8d:d5:e6:25:5c:44
        tcp_mss: 1400
        speed: 1000
        autonegotiate: true
        media_type: sfp
        tloc_extension: test-tloc
        tracker: test-tracker
        gre_tunnel_source_ip: 10.3.1.2
        gre_tunnel_xconnect: xconnect-test
        ip_directed_broadcast: true
        tunnel_interface:
          allow_service_all: false
          allow_service_bgp: false
          allow_service_dhcp: true
          allow_service_dns: true
          allow_service_https: true
