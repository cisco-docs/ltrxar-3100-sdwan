    banner_templates:
      - name: FT-CEDGE-BANNER-01
        description: Base banner template; support carrier returns
        login: "login banner: new\n"
        motd: "motd banner:\r\nNo message today\n"
    bfd_templates:
      - name: FT-CEDGE-BFD-01
        description: BFD base template
        colors:
          - color: custom1
          - color: custom2
          - color: private1
          - color: private2
    bgp_templates:
      - name: FT-CEDGE-BGP-VPN1-ACTIVE
        description: VPN 1 BGP
        ipv4_address_family:
          default_information_originate: false
          maximum_paths_variable: vpn1_bgp_ipv4_maximum_paths
          redistributes:
            - protocol: omp
              optional: false
              route_policy: RM-SITE-BGP-OUT-ACTIVE
          neighbors:
            - address_variable: vpn1_bgp_ipv4_neighbor1_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
              next_hop_self: false
              password_variable: vpn1_bgp_ipv4_neighbor1_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor1_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor1_shutdown
              optional: true
            - address_variable: vpn1_bgp_ipv4_neighbor2_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
              password_variable: vpn1_bgp_ipv4_neighbor2_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor2_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor2_shutdown
              optional: true
        as_number_variable: vpn1_bgp_as_number
        shutdown_variable: vpn1_bgp_shutdown
        holdtime: 3
        keepalive: 1
      - name: FT-CEDGE-BGP-VPN1-STANDBY
        description: VPN 1 BGP
        ipv4_address_family:
          default_information_originate: false
          maximum_paths_variable: vpn1_bgp_ipv4_maximum_paths
          redistributes:
            - protocol: omp
              optional: false
              route_policy: RM-SITE-BGP-OUT-STANDBY
          neighbors:
            - address_variable: vpn1_bgp_ipv4_neighbor1_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
              next_hop_self: false
              password_variable: vpn1_bgp_ipv4_neighbor1_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor1_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor1_shutdown
              optional: true
            - address_variable: vpn1_bgp_ipv4_neighbor2_address
              address_families:
                - family_type: ipv4-unicast
                  maximum_prefixes: 1000
              password_variable: vpn1_bgp_ipv4_neighbor2_password
              remote_as_variable: vpn1_bgp_ipv4_neighbor2_remote_as
              shutdown_variable: vpn1_bgp_ipv4_neighbor2_shutdown
              optional: true
        as_number_variable: vpn1_bgp_as_number
        shutdown_variable: vpn1_bgp_shutdown
        holdtime: 3
        keepalive: 1
    cli_templates:
      - name: FT-EDGE-CLI-LOGGING
        description: "Edge CLI Template to disable DAUTH logs"
        cli_config: |
          logging discriminator auth mnemonics drops AUTH_PASSED
          logging console discriminator auth
          logging buffered discriminator auth
      - name: FT-EDGE-CLI-BGP
        description: "Edge CLI Template to set BGP local AS"
        cli_config: |
          ! This template is using variables
          router bgp {{bgp_as_number}}
            address-family ipv4 unicast vrf 10
            neighbor {{bgp_neighbor_ip}} local-as {{bgp_neighbor_local_as}}
          !
    dhcp_server_templates:
      - name: FT-CEDGE-DHCPSERVER-VPN2-V01
        description: Internet DHCP Server
        address_pool_variable: vpn2_dhcp_address_pool
        exclude_addresses_variable: vpn2_dhcp_exclude_addresses
        lease_time: 3600
        default_gateway_variable: vpn2_dhcp_default_gateway
        dns_servers_variable: vpn2_dhcp_dns_servers
    ethernet_interface_templates:
      - name: FT-CEDGE-WAN-TLOC1
        description: CEDGE TLOC1 with dynamic IP Settings, NAT enabled
        interface_description_variable: vpn0_tloc01_if_description
        interface_name_variable: vpn0_tloc01_if_name
        ipv4_address_dhcp: true
        dhcp_distance: 1
        ipv4_nat: true
        ipv4_nat_type: interface
        shaping_rate_variable: vpn0_tloc01_shaping_rate
        shutdown_variable: vpn0_tloc01_if_shutdown
        tunnel_interface:
          allow_service_bgp: false
          allow_service_dhcp: true
          allow_service_dns: true
          allow_service_https: false
          allow_service_icmp: true
          allow_service_netconf: false
          allow_service_ntp: true
          allow_service_ospf: false
          allow_service_snmp: false
          allow_service_ssh: false
          allow_service_stun: false
          clear_dont_fragment: false
          color_variable: vpn0_tloc01_tunnel_color
          restrict_variable: vpn0_tloc01_tunnel_restrict
          ipsec_encapsulation: true
          ipsec_preference_variable: vpn0_tloc01_tunnel_ipsec_preference
          ipsec_weight_variable: vpn0_tloc01_tunnel_weight
          group_variable: vpn0_tloc01_tunnel_group
          hello_interval: 1000
          hello_tolerance: 12
          vmanage_connection_preference_variable: vpn0_tloc01_tunnel_vmanage_connection_preference
      - name: FT-CEDGE-WAN-TLOC2
        description: CEDGE TLOC2 with dynamic IP Settings, NAT enabled
        interface_description_variable: vpn0_tloc02_if_description
        interface_name_variable: vpn0_tloc02_if_name
        ipv4_address_dhcp: true
        dhcp_distance: 1
        ipv4_nat: true
        ipv4_nat_type: interface
        shaping_rate_variable: vpn0_tloc02_shaping_rate
        shutdown_variable: vpn0_tloc02_if_shutdown
        tunnel_interface:
          allow_service_bgp: false
          allow_service_dhcp: true
          allow_service_dns: true
          allow_service_https: false
          allow_service_icmp: true
          allow_service_netconf: false
          allow_service_ntp: true
          allow_service_ospf: false
          allow_service_snmp: false
          allow_service_ssh: false
          allow_service_stun: false
          clear_dont_fragment: false
          color_variable: vpn0_tloc02_tunnel_color
          restrict_variable: vpn0_tloc02_tunnel_restrict
          ipsec_encapsulation: true
          ipsec_preference_variable: vpn0_tloc02_tunnel_ipsec_preference
          ipsec_weight_variable: vpn0_tloc02_tunnel_weight
          group_variable: vpn0_tloc02_tunnel_group
          hello_interval: 1000
          hello_tolerance: 12
          vmanage_connection_preference_variable: vpn0_tloc02_tunnel_vmanage_connection_preference
      - name: FT-CEDGE-WAN-TLOC1-STATIC
        description: CEDGE TLOC1 with static IP Settings, NAT enabled
        interface_description_variable: vpn0_tloc01_if_description
        interface_name_variable: vpn0_tloc01_if_name
        ipv4_address_variable: vpn0_tloc01_if_ipv4_address
        ipv4_nat: true
        ipv4_nat_type: interface
        qos_map: QOS-MAP-1P4Q
        rewrite_rule: REWRITE-RULE-MPLS
        shaping_rate_variable: vpn0_tloc01_shaping_rate
        shutdown_variable: vpn0_tloc01_if_tracker
        tunnel_interface:
          allow_service_bgp: false
          allow_service_dhcp: true
          allow_service_dns: true
          allow_service_https: false
          allow_service_icmp: true
          allow_service_netconf: false
          allow_service_ntp: true
          allow_service_ospf: false
          allow_service_snmp: false
          allow_service_ssh: false
          allow_service_stun: false
          clear_dont_fragment: false
          color_variable: vpn0_tloc01_tunnel_color
          restrict_variable: vpn0_tloc01_tunnel_restrict
          ipsec_encapsulation: true
          ipsec_preference_variable: vpn0_tloc01_tunnel_ipsec_preference
          ipsec_weight_variable: vpn0_tloc01_tunnel_weight
          group_variable: vpn0_tloc02_tunnel_group
          hello_interval: 1000
          hello_tolerance: 12
          vmanage_connection_preference_variable: vpn0_tloc02_tunnel_vmanage_connection_preference
      - name: FT-CEDGE-WAN-TLOCEXT1
        description: CEDGE TLOC-Extension 1; static IP Settings
        interface_description_variable: vpn0_tlocext1_if_description
        interface_name_variable: vpn0_tlocext1_if_name
        ipv4_address_variable: vpn0_tlocext1_if_ipv4_address
        shutdown_variable: vpn0_tlocext1_if_shutdown
        tloc_extension_variable: vpn0_tlocext1_if_tloc_extension
      - name: FT-CEDGE-LAN-PHYS1
        description: CEDGE Physical LAN interface
        interface_description_variable: vpn0_int1_if_description
        interface_name_variable: vpn0_int1_if_name
        shutdown_variable: vpn0_int1_if_shutdown
      - name: FT-CEDGE-LAN-PHYS2
        description: CEDGE Physical LAN interface
        interface_description_variable: vpn0_int2_if_description
        interface_name_variable: vpn0_int2_if_name
        shutdown_variable: vpn0_int2_if_shutdown
      - name: FT-CEDGE-VPN1-LAN1
        description: CEDGE, VPN 1, L3 LAN1
        interface_description_variable: vpn1_int1_if_description
        interface_name_variable: vpn1_int1_if_name
        ipv4_address_variable: vpn1_int1_if_ipv4_address
        shutdown_variable: vpn1_int1_if_shutdown
      - name: FT-CEDGE-VPN1-LAN1-VRRP
        description: CEDGE, VPN 1, L3 LAN1, VRRP
        interface_description_variable: vpn1_int1_if_description
        interface_name_variable: vpn1_int1_if_name
        ipv4_address_variable: vpn1_int1_if_ipv4_address
        shutdown_variable: vpn1_int1_if_shutdown
        ipv4_vrrp_groups:
          - id_variable: vpn1_int1_vrrp_group_id
            address_variable: vpn1_int1_vrrp_group_ip
            priority_variable: vpn1_int1_vrrp_group_priority
            timer_variable: vpn1_int1_vrrp_group_timer
            tloc_preference_change: false
            track_omp: true
      - name: FT-CEDGE-VPN511-LOOPBACK511
        description: CEDGE, VPN 511, Loopback511
        interface_description_variable: vpn511_int1_if_description
        interface_name_variable: vpn511_int1_if_name
        ipv4_address_variable: vpn511_int1_if_ipv4_address
        shutdown_variable: vpn511_int1_if_shutdown
      - name: FT-CEDGE-VPN512-OOB
        description: CEDGE, VPN 512, L3 OOB interface
        interface_description_variable: vpn512_int1_if_description
        interface_name_variable: vpn512_int1_if_name
        shutdown_variable: vpn512_int1_if_shutdown
        ipv4_address_dhcp: true
        dhcp_distance: 1
    global_settings_templates:
      - name: FT-CEDGE-GLOBAL-01
        description: Base cEdge Global Settings
        cdp_variable: global_cdp_enable
        domain_lookup_variable: global_ip_domain_lookup_enable
        lldp_variable: global_lldp_enable
    ipsec_interface_templates:
      - name: FT-CEDGE-IPSEC101-V01
        description: IPSec Tunnel1 to Zscaler - manual
        dead_peer_detection_interval: 20
        interface_description: Zscaler Tunnel ZEN1
        interface_name: ipsec101
        ike:
          pre_shared_key_local_id: localid@acme.com
          pre_shared_key: presharedsecret
          ciphersuite: aes256-cbc-sha1
          group: 14
          rekey_interval: 14400
          version: 2
        ipsec:
          ciphersuite: null-sha1
          rekey_interval: 28800
          perfect_forward_secrecy: none
        mtu: 1400
        shutdown: false
        tcp_mss: 1360
        tunnel_destination_variable: vpn0_ipsec101_tunnel_dest_ip
        tunnel_source_interface_variable: vpn0_ipsec101_source_wan_if
    logging_templates:
      - name: FT-CEDGE-LOGGING-01
        description: Base Logging template; no TLS
        ipv4_servers:
          - hostname_ip: 172.16.0.11
            logging_level: warn
            source_interface_variable: logging_server_source_interface
            vpn_id: 511
          - hostname_ip: 172.16.0.12
            logging_level: warn
            source_interface_variable: logging_server_source_interface
            vpn_id: 511
    ntp_templates:
      - name: FT-CEDGE-NTP-01
        description: Base NTP template; no auth key; no ntp master
        servers:
          - hostname_ip: 172.16.0.11
            prefer: true
            source_interface_variable: ntp_server_source_interface
            vpn_id: 0
          - hostname_ip: time-pnp.cisco.com
            prefer: false
            source_interface_variable: ntp_server_source_interface
            vpn_id: 0
    omp_templates:
      - name: FT-CEDGE-OMP-01
        description: OMP base template
        ipv4_advertise_protocols:
          - connected
        ecmp_limit: 16
        graceful_restart: true
        send_path_limit: 16
        graceful_restart_timer: 86400
    security_templates:
      - name: FT-CEDGE-SECURITY-01
        description: Base SD-WAN data-plane security
        rekey_interval: 172800
    snmp_templates:
      - name: FT-CEDGE-SNMPV3-01
        description: SNMPv3 template
        contact_variable: snmp_contact
        groups:
          - name: GROUP_NOAUTH_NOPRIV
            security_level: no-auth-no-priv
            view: VIEW_ALL
          - name: GROUP_AUTH_NOPRIV
            security_level: auth-no-priv
            view: VIEW_ALL
          - name: GROUP_AUTH_PRIV
            security_level: auth-priv
            view: VIEW_ALL
        location_variable: snmp_location
        shutdown_variable: snmp_shutdown
        trap_target_servers:
          - ip: 172.16.0.11
            udp_port: 514
            community_name: $CRYPT_CLUSTER$MVeouqBXy9Od6dAYMJ6eTQ==$z0Pl/8UAxXkt1lXOnayv8A==
            source_interface_variable: snmp_trap_source_interface
            user: user01
            vpn_id: 511
        users:
          - name: user01
            group: GROUP_NOAUTH_NOPRIV
          - name: user02
            group: GROUP_AUTH_NOPRIV
            authentication_protocol: sha
            authentication_password: $CRYPT_CLUSTER$ENUwbbutISa31iAXuryRqQ==$CVy9EkMrtaPjTUFxNPv/QA==
          - name: user03
            group: GROUP_AUTH_PRIV
            authentication_protocol: sha
            authentication_password: $CRYPT_CLUSTER$ENUwbbutISa31iAXuryRqQ==$CVy9EkMrtaPjTUFxNPv/QA==
            privacy_protocol: aes-cfb-128
            privacy_password: $CRYPT_CLUSTER$ENUwbbutISa31iAXuryRqQ==$CVy9EkMrtaPjTUFxNPv/QA==
        views:
          - name: VIEW_ALL
            oids:
              - id: "1.3"
                exclude: false
          - name: VIEW_ALL2
            oids:
              - id: "1.3"
                exclude: false
    system_templates:
      - name: FT-CEDGE-SYSTEM-01
        description: Base Cisco System template
        timezone_variable: timezone
        system_description_variable: system_description
        latitude_variable: system_latitude
        longitude_variable: system_longitude
        hostname_variable: system_hostname
        idle_timeout: 300
        location_variable: system_location
        on_demand_tunnel_variable: ondemand_tunnel_enable
        on_demand_tunnel_idle_timeout_variable: ondemand_tunnel_idle_timeout
        site_id_variable: site_id
        system_ip_variable: system_ip
      - name: FT-CEDGE-SYSTEM-02
        description: Tracker example configs
        console_baud_rate: 9600
        timezone_variable: timezone
        system_description_variable: system_description
        hostname_variable: system_hostname
        idle_timeout: 300
        location_variable: system_location
        site_id_variable: system_site_id
        system_ip_variable: system_system_ip
        endpoint_trackers:
          - name: tracker_google_ip
            endpoint_ip: 142.251.36.36
            interval: 60
            multiplier: 3
            threshold: 300
            type: interface
          - name: tracker_google_ip_route
            endpoint_ip: 142.251.36.36
            type: static-route
          - name: tracker_google_url
            endpoint_api_url: http://www.google.com
            type: interface
          - name: tracker_microsoft_url
            endpoint_api_url: http://www.microsoft.com
            type: interface
          - name: tracker_google_dns
            endpoint_dns_name: www.google.com
          - name: tracker_group_internet
            group_trackers:
              - tracker_google_url
              - tracker_microsoft_url
            group_criteria: and
    svi_interface_templates:
      - name: FT-EDGE-VPN10-SVI1
        description: "EDGE SVI Interface"
        arp_timeout: 14400
        ip_directed_broadcast: false
        ip_mtu: 1350
        interface_description_variable: vpn10_svi1_if_description
        interface_name_variable: vpn10_svi1_if_name
        ipv4_address_variable: vpn10_svi1_ipv4_address
        ipv4_ingress_access_list: QOS_ACL_IN
        ipv4_egress_access_list_variable: vpn10_svi1_egress_acl
        ipv6_ingress_access_list: QOS_ACL_IN_6
        ipv6_egress_access_list: QOS_ACL_OUT_6
        ipv6_address_variable: vpn10_svi1_ipv6_address
        mtu: 9000
        shutdown: false
        tcp_mss: 1360
        ipv4_secondary_addresses:
          - address: 10.10.1.2
          - address_variable: ipv4_secondary_address
        ipv4_dhcp_helpers:
          - 10.10.10.4
          - 10.10.10.5
        ipv6_dhcp_helpers:
          - address: 2001:db8:1::1
            vpn_id: 10
          - address_variable: vpn10_svi1_ipv6_dhcp_helper
            vpn_id_variable: vpn10_svi1_ipv6_dhcp_helper_vpn_id
        ipv6_secondary_addresses:
          - address: 2001:db8:1::2
          - address: 2001:db8:1::3
        static_arps:
          - ip_address: 10.10.54.96
            mac_address: 00:00:00:00:00:04
          - ip_address_variable: vpn10_svi1_static_arp_ip
