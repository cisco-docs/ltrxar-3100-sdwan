    cedge_global:
      - name: FT-CEDGE-GLOBAL-01
        description: Base cEdge Global Settings
        parameters:
          services-global:
            services-ip:
              cdp: DEVICE_VARIABLE;global_cdp_enable
              domain-lookup: DEVICE_VARIABLE;global_ip_domain_lookup_enable
              lldp: DEVICE_VARIABLE;global_lldp_enable
    cisco_banner:
      - name: FT-CEDGE-BANNER-01
        description: Base banner template; support carrier returns
        parameters:
          login: "login banner: new\n"
          motd: "motd banner:\r\nNo message today\n"
    cisco_bfd:
      - name: FT-CEDGE-BFD-01
        description: BFD base template
        parameters:
          color:
            - color: custom1
            - color: custom2
            - color: private1
            - color: private2
    cisco_bgp:
      - name: FT-CEDGE-BGP-VPN1
        description: VPN 1 BGP
        parameters:
          bgp:
            address-family:
              - default-information:
                  originate: "false"
                family-type: ipv4-unicast
                maximum-paths:
                  paths: DEVICE_VARIABLE;vpn1_bgp_ipv4_maximum_paths
                redistribute:
                  - protocol: omp
                    optional: false
            as-num: DEVICE_VARIABLE;vpn1_bgp_as_number
            neighbor:
              - address: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor1_address
                address-family:
                  - family-type: ipv4-unicast
                    maximum-prefixes:
                      prefix-num: 1000
                next-hop-self: "false"
                password: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor1_password
                remote-as: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor1_remote_as
                shutdown: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor1_shutdown
                optional: true
              - address: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor2_address
                address-family:
                  - family-type: ipv4-unicast
                    maximum-prefixes:
                      prefix-num: 1000
                password: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor2_password
                remote-as: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor2_remote_as
                shutdown: DEVICE_VARIABLE;vpn1_bgp_ipv4_neighbor2_shutdown
                optional: true
            shutdown: DEVICE_VARIABLE;vpn1_bgp_shutdown
            timers:
              holdtime: 3
              keepalive: 1
    cisco_dhcp_server:
      - name: FT-CEDGE-DHCPSERVER-VPN2-V01
        description: Internet DHCP Server
        parameters:
          address-pool: DEVICE_VARIABLE;vpn2_dhcp_address_pool
          exclude: DEVICE_VARIABLE;vpn2_dhcp_exclude_addresses
          lease-time: 3600
          options:
            default-gateway: DEVICE_VARIABLE;vpn2_dhcp_default_gateway
            dns-servers: DEVICE_VARIABLE;vpn2_dhcp_dns_servers
    cisco_logging:
      - name: FT-CEDGE-LOGGING-01
        description: "Base Logging template; no TLS"
        parameters:
          server:
            - name: 172.16.0.11
              priority: warn
              source-interface: DEVICE_VARIABLE;logging_server_source_interface
              vpn: 511
            - name: 172.16.0.12
              priority: warn
              source-interface: DEVICE_VARIABLE;logging_server_source_interface
              vpn: 511
    cisco_ntp:
      - name: FT-CEDGE-NTP-01
        description: "Base NTP template; no auth key; no ntp master"
        parameters:
          server:
            - name: 172.16.0.11
              prefer: "true"
              source-interface: DEVICE_VARIABLE;ntp_server_source_interface
              vpn: 0
            - name: time-pnp.cisco.com
              prefer: "false"
              source-interface: DEVICE_VARIABLE;ntp_server_source_interface
              vpn: 0
    cisco_omp:
      - name: FT-CEDGE-OMP-01
        description: "OMP base template"
        parameters:
          advertise:
            - protocol: connected
          ecmp-limit: 16
          graceful-restart: "true"
          send-path-limit: 16
          timers:
            graceful-restart-timer: 86400
    cisco_secure_internet_gateway:
      - name: FT-CEDGE-SIG-UMBRELLA01
        description: Umbrella SIG 1x HA Tunnel
        parameters:
          interface:
            - application: sig
              auto: "true"
              dead-peer-detection:
                dpd-interval: 10
                dpd-retries: 3
              if-name: ipsec1
              ike:
                authentication-type:
                  pre-shared-key-dynamic: "true"
                ike-rekey-interval: 14400
                ike-version: 2
              ip:
                unnumbered: "true"
              ipsec:
                ipsec-ciphersuite: aes256-cbc-sha1
                ipsec-rekey-interval: 28800
              mtu: 1400
              tcp-mss-adjust: 1360
              tunnel-dc-preference: primary-dc
              tunnel-destination: dynamic
              tunnel-set: secure-internet-gateway-umbrella
              tunnel-source-interface: DEVICE_VARIABLE;sig_tunnel1_source_interface
            - application: sig
              auto: "true"
              dead-peer-detection:
                dpd-interval: 10
                dpd-retries: 3
              if-name: ipsec2
              ike:
                authentication-type:
                  pre-shared-key-dynamic: "true"
                ike-rekey-interval: 14400
                ike-version: 2
              ip:
                unnumbered: "true"
              ipsec:
                ipsec-ciphersuite: aes256-cbc-sha1
                ipsec-rekey-interval: 28800
              mtu: 1400
              tcp-mss-adjust: 1360
              tunnel-dc-preference: secondary-dc
              tunnel-destination: dynamic
              tunnel-set: secure-internet-gateway-umbrella
              tunnel-source-interface: DEVICE_VARIABLE;sig_tunnel2_source_interface
          service:
            - ha-pairs:
                interface-pair:
                  - active-interface: ipsec1
                    active-interface-weight: 1
                    backup-interface: ipsec2
                    backup-interface-weight: 1
              svc-type: sig
          tracker-src-ip: DEVICE_VARIABLE;sig_tracker_srcip
          vpn-id: 0
    cisco_security:
      - name: FT-CEDGE-SECURITY-01
        description: "Base SD-WAN data-plane security"
        parameters:
          ipsec:
            rekey: 172800
    cisco_sig_credentials:
      - name: FT-CEDGE-SIG-CREDS-UMBRELLA-01
        description: "Global Umbrella SIG Credentials"
        parameters:
          umbrella:
            api-key: 7f33d6ee0d56402c83c503a669a80d22
            api-secret: $CRYPT_CLUSTER$5dYqYjx7vO3/77uFutA+Sg==$m0ROjLW4OiuqFNkDQUFwoSwjbFB3aYhTj2KL+/g2HKygHy/EgUInhDtHXCUuKrxq
            org-id: "1974315"
    cisco_snmp:
      - name: FT-CEDGE-SNMPV3-01
        description: "SNMPv3 template"
        parameters:
          contact: DEVICE_VARIABLE;snmp_contact
          group:
            - name: GROUP_NOAUTH_NOPRIV
              security-level: no-auth-no-priv
              view: VIEW_ALL
            - name: GROUP_AUTH_NOPRIV
              security-level: auth-no-priv
              view: VIEW_ALL
            - name: GROUP_AUTH_PRIV
              security-level: auth-priv
              view: VIEW_ALL
          location: DEVICE_VARIABLE;snmp_location
          shutdown: DEVICE_VARIABLE;snmp_shutdown
          trap:
            target:
              - community-name: $CRYPT_CLUSTER$MVeouqBXy9Od6dAYMJ6eTQ==$z0Pl/8UAxXkt1lXOnayv8A==
                ip: 172.16.0.11
                port: 514
                source-interface: DEVICE_VARIABLE;snmp_trap_source_interface
                user: user01
                vpn-id: 511
          user:
            - group: GROUP_NOAUTH_NOPRIV
              name: user01
            - auth: sha
              auth-password: $CRYPT_CLUSTER$ENUwbbutISa31iAXuryRqQ==$CVy9EkMrtaPjTUFxNPv/QA==
              group: GROUP_AUTH_NOPRIV
              name: user02
            - auth: sha
              auth-password: $CRYPT_CLUSTER$ENUwbbutISa31iAXuryRqQ==$CVy9EkMrtaPjTUFxNPv/QA==
              group: GROUP_AUTH_PRIV
              name: user03
              priv: aes-cfb-128
              priv-password: $CRYPT_CLUSTER$ENUwbbutISa31iAXuryRqQ==$CVy9EkMrtaPjTUFxNPv/QA==
          view:
            - name: VIEW_ALL
              oid:
                - exclude: "false"
                  id: "1.3"
            - name: VIEW_ALL2
              oid:
                - exclude: "false"
                  id: "1.3"
    cisco_system:
      - name: FT-CEDGE-SYSTEM-01
        description: "Base Cisco System template"
        parameters:
          clock:
            timezone: DEVICE_VARIABLE;timezone
          description: DEVICE_VARIABLE;system_description
          gps-location:
            latitude: DEVICE_VARIABLE;system_latitude
            longitude: DEVICE_VARIABLE;system_longitude
          host-name: DEVICE_VARIABLE;system_hostname
          idle-timeout: 300
          location: DEVICE_VARIABLE;system_location
          on-demand:
            enable: DEVICE_VARIABLE;ondemand_tunnel_enable
            idle-timeout: DEVICE_VARIABLE;ondemand_tunnel_idle_timeout
          site-id: DEVICE_VARIABLE;site_id
          system-ip: DEVICE_VARIABLE;system_ip
      - name: FT-CEDGE-SYSTEM-02
        description: Tracker example configs
        parameters:
          console-baud-rate: "9600"
          clock:
            timezone: DEVICE_VARIABLE;timezone
          description: DEVICE_VARIABLE;system_description
          host-name: DEVICE_VARIABLE;system_hostname
          idle-timeout: 300
          location: DEVICE_VARIABLE;system_location
          site-id: DEVICE_VARIABLE;system_site_id
          system-ip: DEVICE_VARIABLE;system_system_ip
          tracker:
            - endpoint-ip: 142.251.36.36
              interval: 60
              multiplier: 3
              name: tracker_google_ip
              threshold: 300
              type: interface
            - endpoint-ip: 142.251.36.36
              name: tracker_google_ip_route
              type: static-route
            - endpoint-api-url: http://www.google.com
              name: tracker_google_url
              type: interface
            - endpoint-api-url: http://www.microsoft.com
              name: tracker_microsoft_url
              type: interface
            - endpoint-dns-name: www.google.com
              name: tracker_google_dns
            - boolean: and
              elements:
                - tracker_google_url
                - tracker_microsoft_url
              name: tracker_group_internet
              type: tracker-group
    cisco_thousandeyes:
      - name: FT-CEDGE-THOUSANDEYES-01
        description: TE Agent, static proxy
        parameters:
          virtual-application:
            - application-type: te
              instance-id: d504ae0a-29f7-46a5-8466-7e6e283a8810
              te:
                name-server: DEVICE_VARIABLE;thousandeyes_name_server
                proxy_static:
                  proxy_host: DEVICE_VARIABLE;thousandeyes_proxy_host
                  proxy_port: DEVICE_VARIABLE;thousandeyes_proxy_port
                proxy_type: static
                te-mgmt-ip: DEVICE_VARIABLE;thousandeyes_agent_ip
                te-vpg-ip: DEVICE_VARIABLE;thousandeyes_agent_default_gateway
                token: DEVICE_VARIABLE;thousandeyes_token
                vpn: DEVICE_VARIABLE;thousandeyes_vpn
      - name: FT-CEDGE-THOUSANDEYES-02
        description: TE agent - VPN 1, PAC proxy
        parameters:
          virtual-application:
            - application-type: te
              instance-id: 2398056e-657d-442f-96aa-88ea5ddc0f5d
              te:
                hostname: DEVICE_VARIABLE;thousandeyes_hostname
                proxy_pac:
                  pac_url: DEVICE_VARIABLE;thousandeyes_pac_url
                proxy_type: pac
                te-mgmt-ip: DEVICE_VARIABLE;thousandeyes_agent_ip
                te-vpg-ip: DEVICE_VARIABLE;thousandeyes_agent_default_gateway
                token: DEVICE_VARIABLE;thousandeyes_token
                vpn: 1
    cisco_vpn:
      - name: FT-CEDGE-VPN0-01
        description: "CEDGE VPN0 with dynamic IP settings"
        parameters:
          ecmp-hash-key:
            layer4: DEVICE_VARIABLE;vpn0_layer4_ecmp_enable
          name: VPN0
          vpn-id: 0
      - name: FT-CEDGE-VPN0-02
        description: "CEDGE VPN0 with static IP settings"
        parameters:
          dns:
            - dns-addr: DEVICE_VARIABLE;vpn0_dns_primary
              role: primary
            - dns-addr: DEVICE_VARIABLE;vpn0_dns_secondary
              role: secondary
          ecmp-hash-key:
            layer4: DEVICE_VARIABLE;vpn0_layer4_ecmp_enable
          ip:
            route:
              - next-hop:
                  - address: DEVICE_VARIABLE;vpn0_ipv4_route1_nexthop1_ip
                    distance: DEVICE_VARIABLE;vpn0_ipv4_route1_nexthop1_distance
                prefix: DEVICE_VARIABLE;vpn0_ipv4_route1_prefix
                optional: false
          name: VPN0
          vpn-id: 0
      - name: FT-CEDGE-VPN0-03
        description: "CEDGE VPN0 with static IP routes"
        parameters:
          ecmp-hash-key:
            layer4: DEVICE_VARIABLE;vpn0_layer4_ecmp_enable
          ip:
            route:
              - next-hop:
                  - address: DEVICE_VARIABLE;vpn0_ipv4_route1_nexthop1_ip
                    distance: DEVICE_VARIABLE;vpn0_ipv4_route1_nexthop1_distance
                prefix: DEVICE_VARIABLE;vpn0_ipv4_route1_prefix
                optional: true
              - next-hop:
                  - address: DEVICE_VARIABLE;vpn0_ipv4_route2_nexthop1_ip
                    distance: DEVICE_VARIABLE;vpn0_ipv4_route2_nexthop1_distance
                prefix: DEVICE_VARIABLE;vpn0_ipv4_route2_prefix
                optional: true
          name: VPN0
          vpn-id: 0
      - name: FT-CEDGE-VPN1-01
        description: "CEDGE VPN1 CORPORATE"
        parameters:
          ip:
            route:
              - next-hop:
                  - address: DEVICE_VARIABLE;vpn1_ipv4_route1_nexthop1_ip
                    distance: DEVICE_VARIABLE;vpn1_ipv4_route1_nexthop1_distance
                prefix: DEVICE_VARIABLE;vpn1_ipv4_route1_prefix
                optional: true
              - next-hop:
                  - address: DEVICE_VARIABLE;vpn1_ipv4_route2_nexthop1_ip
                    distance: DEVICE_VARIABLE;vpn1_ipv4_route2_nexthop1_distance
                prefix: DEVICE_VARIABLE;vpn1_ipv4_route2_prefix
                optional: true
              - next-hop:
                  - address: DEVICE_VARIABLE;vpn1_ipv4_route3_nexthop1_ip
                    distance: DEVICE_VARIABLE;vpn1_ipv4_route3_nexthop1_distance
                prefix: DEVICE_VARIABLE;vpn1_ipv4_route3_prefix
                optional: true
              - next-hop:
                  - address: DEVICE_VARIABLE;vpn1_ipv4_route4_nexthop1_ip
                    distance: DEVICE_VARIABLE;vpn1_ipv4_route4_nexthop1_distance
                prefix: DEVICE_VARIABLE;vpn1_ipv4_route4_prefix
                optional: true
          name: CORPORATE
          omp:
            advertise:
              - protocol: bgp
              - protocol: static
              - protocol: connected
          omp-admin-distance-ipv4: 251
          vpn-id: 1
      - name: FT-CEDGE-VPN2-01
        description: VPN 2 INTERNET
        parameters:
          ip:
            route:
              - prefix: 0.0.0.0/0
                vpn: 0
          name: INTERNET
          vpn-id: 2
      - name: FT-CEDGE-VPN511-01
        description: "CEDGE VPN511"
        parameters:
          name: INBAND-MGMT
          omp:
            advertise:
              - protocol: connected
          vpn-id: 511
      - name: FT-CEDGE-VPN512-01
        description: "CEDGE VPN512"
        parameters:
          name: OOB
          vpn-id: 512
    cisco_vpn_interface:
      - name: FT-CEDGE-WAN-TLOC1
        description: "CEDGE TLOC1 with dynamic IP Settings, NAT enabled"
        parameters:
          description: DEVICE_VARIABLE;vpn0_tloc01_if_description
          if-name: DEVICE_VARIABLE;vpn0_tloc01_if_name
          ip:
            dhcp-client: "true"
            dhcp-distance: 1
          nat:
            nat-choice: interface
          shaping-rate: DEVICE_VARIABLE;vpn0_tloc01_shaping_rate
          shutdown: DEVICE_VARIABLE;vpn0_tloc01_if_shutdown
          tunnel-interface:
            allow-service:
              bgp: "false"
              dhcp: "true"
              dns: "true"
              https: "false"
              icmp: "true"
              netconf: "false"
              ntp: "true"
              ospf: "false"
              snmp: "false"
              sshd: "false"
              stun: "false"
            clear-dont-fragment: "false"
            color:
              restrict: DEVICE_VARIABLE;vpn0_tloc01_tunnel_restrict
              value: DEVICE_VARIABLE;vpn0_tloc01_tunnel_color
            encapsulation:
              - encap: ipsec
                preference: DEVICE_VARIABLE;vpn0_tloc01_tunnel_ipsec_preference
                weight: DEVICE_VARIABLE;vpn0_tloc01_tunnel_weight
            group: DEVICE_VARIABLE;vpn0_tloc01_tunnel_group
            hello-interval: 1000
            hello-tolerance: 12
            vmanage-connection-preference: DEVICE_VARIABLE;vpn0_tloc01_tunnel_vmanage_connection_preference
      - name: FT-CEDGE-WAN-TLOC2
        description: "CEDGE TLOC2 with dynamic IP Settings, NAT enabled"
        parameters:
          description: DEVICE_VARIABLE;vpn0_tloc02_if_description
          if-name: DEVICE_VARIABLE;vpn0_tloc02_if_name
          ip:
            dhcp-client: "true"
            dhcp-distance: 1
          nat:
            nat-choice: interface
          shaping-rate: DEVICE_VARIABLE;vpn0_tloc02_shaping_rate
          shutdown: DEVICE_VARIABLE;vpn0_tloc02_if_shutdown
          tunnel-interface:
            allow-service:
              bgp: "false"
              dhcp: "true"
              dns: "true"
              https: "false"
              icmp: "true"
              netconf: "false"
              ntp: "true"
              ospf: "false"
              snmp: "false"
              sshd: "false"
              stun: "false"
            clear-dont-fragment: "false"
