---
# Localized Policies
sdwan:
  policy_objects:
    lists:
      app:
        - name: OFFICE365
          description: Microsoft Office 365
          entries:
            - app: ms-ocs-file-transfer
            - app: ms-office-365
            - app: ms-office-web-apps
            - app: ms-live-accounts
            - app: exchange
            - app: ms-teams
            - app: ms-teams-audio
            - app: ms-teams-media
            - app: ms-teams-video
            - app: netshow
            - app: msnp
            - app: ms-lync
            - app: ms-lync-audio
            - app: ms-lync-control
            - app: ms-lync-video
            - app: skype
            - app: skydrive
            - app: share-point
            - app: outlook-web-service
        - name: APPF-CRITICALDATA
          description: Desc Not Required
          entries:
            - appFamily: application-service
            - appFamily: database
            - appFamily: erp
            - appFamily: microsoft-office
            - appFamily: middleware
            - appFamily: network-management
      asPath:
        - name: ASPATH-PRIVATE
          description: "Private AS Path list"
          entries:
            - asPath: ^65100
            - asPath: ^65101
      class:
        - name: CLASS-REALTIME
          description: "Realtime QoS Class"
          entries:
            - queue: "0"
        - name: CLASS-NETCONTROL
          description: "Net control QoS Class"
          entries:
            - queue: "1"
        - name: CLASS-DEFAULT
          description: "Default QoS Class"
          entries:
            - queue: "2"
        - name: CLASS-CRITICALDATA
          description: "Critical data QoS Class"
          entries:
            - queue: "3"
        - name: CLASS-SCAVENGER
          description: "Scavenger QoS Class"
          entries:
            - queue: "4"
      color:
        - name: CL-INTERNET
          description: Desc Not Required
          entries:
            - color: custom1
            - color: custom2
      community:
        - name: COMMUNITY-REGION1
          description: "Region01 community"
          entries:
            - community: 1000:1000
      dataPrefix:
        - name: DPL-DEFAULT
          description: "Default IPv4 prefix"
          entries:
            - ipPrefix: 0.0.0.0/0
            - ipPrefix: 1.1.1.1/32
      expandedCommunity:
        - name: COMMUNITY-LEGACY-WAN
          description: "Legacy WAN community list"
          entries:
            - community: 65148:926
            - community: 65149:926
            - community: "65146:10"
      extCommunity:
        - name: EXTCOMMUNITY-LEGACY-WAN
          description: "Legacy WAN community list"
          entries:
            - community: soo 1:1;rt 1:1
      policer:
        - name: POLICER-TEST
          description: Desc Not Required
          entries:
            - burst: "2000000"
              exceed: remark
              rate: "250000000"
      prefix:
        - name: PLV4-PRIVATE-RANGES
          description: "IPv4 private ranges"
          entries:
            - ipPrefix: 10.0.0.0/8
            - ipPrefix: 172.16.0.0/12
      site:
        - name: SL-EMEA
          description: Desc Not Required
          entries:
            - siteId: 1000-1999
            - siteId: 10000-19999
      sla:
        - name: Best-Effort
          description: Best Effort SLA
          entries:
            - jitter: "500"
              latency: "500"
              loss: "5"
      tloc:
        - name: TLOC-EMEA-HUB
          description: EMEA HUB TLOCs
          entries:
            - color: custom1
              encap: ipsec
              tloc: 10.0.2.101
            - color: custom2
              encap: ipsec
              tloc: 10.0.2.101
      vpn:
        - name: VPN-MGMT
          description: "Mgmt VPNs"
          entries:
            - vpn: "511"
            - vpn: 51-52
