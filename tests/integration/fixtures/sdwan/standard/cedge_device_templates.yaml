                  templateType: cisco_vpn_interface
              templateName: FT-CEDGE-VPN512-01
              templateType: cisco_vpn
            - templateName: FT-CEDGE-CLI-01
              templateType: cli-template
            - subTemplates:
                - templateName: FT-CEDGE-NTP-01
                  templateType: cisco_ntp
