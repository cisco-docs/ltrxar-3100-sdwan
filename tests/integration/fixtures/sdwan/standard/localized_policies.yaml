---
# Localized Policies
sdwan:
  localized_policies:
    definitions:
      acl:
        - name: ACL-TLOCEXT-DSCP
          description: "Set traffic class based on DSCP on inbound tloc-extension"
          parameters:
            defaultAction:
              type: accept
            sequences:
              - actions:
                  - parameter:
                      ref: CLASS-REALTIME
                    type: class
                  - parameter: 10-CLASS-REALTIME
                    type: count
                baseAction: accept
                match:
                  entries:
                    - field: dscp
                      value: "46"
                sequenceId: 10
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
              - actions:
                  - parameter:
                      ref: CLASS-NETCONTROL
                    type: class
                baseAction: accept
                match:
                  entries:
                    - field: dscp
                      value: "48"
                sequenceId: 20
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
              - actions:
                  - parameter:
                      ref: CLASS-DEFAULT
                    type: class
                baseAction: accept
                match:
                  entries:
                    - field: dscp
                      value: "0"
                sequenceId: 30
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
              - actions:
                  - parameter:
                      ref: CLASS-CRITICALDATA
                    type: class
                baseAction: accept
                match:
                  entries:
                    - field: dscp
                      value: "26"
                sequenceId: 40
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
              - actions:
                  - parameter:
                      ref: CLASS-SCAVENGER
                    type: class
                baseAction: accept
                match:
                  entries:
                    - field: dscp
                      value: "8"
                sequenceId: 50
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
        - name: ACL-NETCONF830-DROP
          description: "Drop traffic to netconf port"
          parameters:
            defaultAction:
              type: accept
            sequences:
              - actions:
                  - parameter: 10-DROP-NETCONF
                    type: count
                baseAction: drop
                match:
                  entries:
                    - field: destinationPort
                      value: "830"
                    - field: destinationIp
                      value: 10.1.1.1/32
                sequenceId: 10
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
        - name: ACL-GRE-DROP
          description: "Drop non-encrypted tunneled traffic GRE IPIP"
          parameters:
            defaultAction:
              type: accept
            sequences:
              - actions:
                  - parameter: 10-DROP-TUNNEL
                    type: count
                baseAction: drop
                match:
                  entries:
                    - field: protocol
                      value: 47 94
                sequenceId: 10
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
        - name: ACL-SET-NEXTHOP
          description: set nexthop
          parameters:
            defaultAction:
              type: accept
            sequences:
              - actions:
                  - parameter:
                      - field: dscp
                        value: "0"
                      - field: nextHop
                        value: 10.1.1.1
                    type: set
                  - parameter: INTERNET
                    type: count
                  - parameter: ""
                    type: log
                  - parameter:
                      ref: CLASS-DEFAULT
                    type: class
                baseAction: accept
                match:
                  entries:
                    # - field: sourceDataPrefixList
                    #   ref: DPL-PRIVATE-RANGES
                    - field: destinationDataPrefixList
                      ref: DPL-DEFAULT
                sequenceId: 1
                sequenceIpType: ipv4
                sequenceName: Access Control List
                sequenceType: acl
      deviceAccessPolicy:
        - name: ACL-DEVICEACCESSPOLICY-01
          description: "SSH and SNMP access control"
          parameters:
            defaultAction:
              type: drop
            sequences:
              - actions:
                  - parameter: SEQ10-SSH
                    type: count
                baseAction: accept
                match:
                  entries:
                    - field: sourceIp
                      value: 10.254.1.0/24
                    - field: destinationIp
                      value: 10.253.7.0/24
                    - field: destinationPort
                      value: "22"
                sequenceId: 10
                sequenceIpType: ipv4
                sequenceName: Device Access Control List
                sequenceType: deviceaccesspolicy
              - actions:
                  - parameter: SEQ20-SNMP
                    type: count
                baseAction: accept
                match:
                  entries:
                    - field: sourceIp
                      value: 10.254.1.0/24
                    - field: destinationIp
                      value: 10.253.7.0/24
                    - field: destinationPort
                      value: "161"
                sequenceId: 20
                sequenceIpType: ipv4
                sequenceName: Device Access Control List
                sequenceType: deviceaccesspolicy
      qosMap:
        - name: QOS-MAP-1P4Q
          description: "1-prio 4-red queue qos-map"
          parameters:
            definition:
              qosSchedulers:
                - bandwidthPercent: "10"
                  bufferPercent: "10"
                  burst: "200000"
                  classMapRef: CLASS-REALTIME
                  drops: tail-drop
                  queue: "0"
                  scheduling: llq
                  tempKeyValues: Low Latency Queuing(LLQ) Tail CLASS-REALTIME
                - bandwidthPercent: "15"
                  bufferPercent: "15"
                  classMapRef: CLASS-NETCONTROL
                  drops: red-drop
                  queue: "1"
                  scheduling: wrr
                  tempKeyValues: Weighted Round Robin(WRR) Random Early CLASS-NETCONTROL
                - bandwidthPercent: "40"
                  bufferPercent: "40"
                  classMapRef: CLASS-DEFAULT
                  drops: red-drop
                  queue: "2"
                  scheduling: wrr
                  tempKeyValues: Weighted Round Robin(WRR) Random Early CLASS-DEFAULT
                - bandwidthPercent: "30"
                  bufferPercent: "30"
                  classMapRef: CLASS-CRITICALDATA
                  drops: red-drop
                  queue: "3"
                  scheduling: wrr
                  tempKeyValues: Weighted Round Robin(WRR) Random Early CLASS-CRITICALDATA
                - bandwidthPercent: "5"
                  bufferPercent: "5"
                  classMapRef: CLASS-SCAVENGER
                  drops: red-drop
                  queue: "4"
                  scheduling: wrr
                  tempKeyValues: Weighted Round Robin(WRR) Random Early CLASS-SCAVENGER
      rewriteRule:
        - name: REWRITE-RULE-MPLS
          description: "DCSP rewrite for MPLS underlay"
          parameters:
            definition:
              rules:
                - class: CLASS-REALTIME
                  dscp: "46"
                  plp: high
                - class: CLASS-NETCONTROL
                  dscp: "48"
                  plp: high
                - class: CLASS-DEFAULT
                  dscp: "0"
                  plp: low
                - class: CLASS-CRITICALDATA
                  dscp: "26"
                  plp: high
                - class: CLASS-SCAVENGER
                  dscp: "0"
                  plp: low
      vedgeRoute:
        - name: ROUTE-MAP-SET-OMPTAG
          description: "Set OMP tag based on community list"
          parameters:
            defaultAction:
              type: accept
            sequences:
              - actions:
                  - parameter:
                      - field: ompTag
                        value: "1122334455"
                    type: set
                baseAction: accept
                match:
                  entries:
                    - field: community
                      matchFlag: or
                      ref: COMMUNITY-REGION1
                sequenceId: 10
                sequenceIpType: ipv4
                sequenceName: Route
                sequenceType: vedgeRoute
        - name: ROUTE-MAP-SET-COMMUNITY
          description: "Set community"
          parameters:
            defaultAction:
              type: accept
            sequences:
              - actions:
                  - parameter:
                      - field: community
                        value: internet
                      - field: communityAdditive
                        value: "true"
                    type: set
                baseAction: accept
                match:
                  entries:
                    - field: asPath
                      ref: ASPATH-PRIVATE
                sequenceId: 10
                sequenceIpType: ipv4
                sequenceName: Route
                sequenceType: vedgeRoute
    policies:
      feature:
        - name: LOCAL-POLICY-TEMPLATE-01
          description: "Localized Policy v01"
          parameters:
            assembly:
              - definitionName: ACL-NETCONF830-DROP
                type: acl
              - definitionName: ACL-DEVICEACCESSPOLICY-01
                type: deviceAccessPolicy
              - definitionName: QOS-MAP-1P4Q
                type: qosMap
              - definitionName: REWRITE-RULE-MPLS
                type: rewriteRule
              - definitionName: ROUTE-MAP-SET-OMPTAG
                type: vedgeRoute
            settings:
              appVisibility: true
              appVisibilityIPv6: false
              flowVisibility: true
              flowVisibilityIPv6: false
              implicitAclLogging: false
              ipV6VisibilityCacheEntries: 1000
              ipVisibilityCacheEntries: 1000
              logFrequency: 1024
        - name: LOCAL-POLICY-TEMPLATE-02
          description: "Localized Policy v02"
          parameters:
            assembly:
              - definitionName: ACL-TLOCEXT-DSCP
                type: acl
              - definitionName: ACL-NETCONF830-DROP
                type: acl
              - definitionName: ACL-DEVICEACCESSPOLICY-01
                type: deviceAccessPolicy
              - definitionName: QOS-MAP-1P4Q
                type: qosMap
              - definitionName: REWRITE-RULE-MPLS
                type: rewriteRule
              - definitionName: ROUTE-MAP-SET-OMPTAG
                type: vedgeRoute
            settings:
              appVisibility: false
              appVisibilityIPv6: false
              flowVisibility: false
              flowVisibilityIPv6: false
              implicitAclLogging: false
              ipV6VisibilityCacheEntries: null
              ipVisibilityCacheEntries: null
              logFrequency: null
        - name: LOCAL-POLICY-TEMPLATE-03
          description: "Localized Policy v03"
          parameters:
            settings:
              appVisibility: true
              appVisibilityIPv6: false
              implicitAclLogging: true
              logFrequency: 1024
