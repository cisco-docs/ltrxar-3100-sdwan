sdwan:
  edge_feature_templates:

    vpn_templates:
      - name: FT-REMOTE-VPN30-CORP
        description: VPN 30 for CORP
        vpn_name: CORP
        vpn_id: 30
        omp_advertise_ipv4_routes:
          - protocol: connected
          - protocol: static
          - protocol: bgp
        ipv4_static_routes:
          - prefix_variable: vpn30_default_route_prefix
            optional: false
            next_hops:
              - address_variable: vpn30_default_route_next_hop
                distance_variable: vpn30_default_route_distance

      - name: FT-REMOTE-VPN40-GUEST
        description: VPN 40 for GUEST
        vpn_name: GUEST
        vpn_id: 40
        omp_advertise_ipv4_routes:
          - protocol: connected
          - protocol: static
          - protocol: bgp
        ipv4_static_routes:
          - prefix_variable: vpn40_default_route_prefix
            optional: false
            next_hops:
              - address_variable: vpn40_default_route_next_hop
                distance_variable: vpn40_default_route_distance

      - name: FT-REMOTE-VPN0-OVERLAY
        description: CEDGE VPN0 with static IP settings
        ipv4_primary_dns_server_variable: vpn0_dns_primary
        ipv4_secondary_dns_server_variable: vpn0_dns_secondary
        enhance_ecmp_keying_variable: vpn0_layer4_ecmp_enable
        vpn_name: VPN0
        vpn_id: 0
        ipv4_static_routes:
          - prefix: 0.0.0.0/0
            optional: false
            next_hops:
              - address_variable: vpn0_ipv4_route1_nexthop1_ip
                distance_variable: vpn0_ipv4_route1_nexthop1_distance
              - address_variable: vpn0_ipv4_route1_nexthop2_ip
                distance_variable: vpn0_ipv4_route1_nexthop2_distance

      - name: FT-REMOTE-VPN512-MGMT
        description: CEDGE VPN512
        vpn_name: OOB
        vpn_id: 512

    ethernet_interface_templates:
      - name: FT-TLOC1-PUBLIC-REMOTE-VPN0
        description: CEDGE TLOC1 with static IP Settings, NAT enabled
        interface_description_variable: vpn0_tloc01_if_description
        interface_name_variable: vpn0_tloc01_if_name
        ipv4_address_variable: vpn0_tloc01_if_ipv4_address
        ipv4_nat: true
        ipv4_nat_type: interface
        shaping_rate_variable: vpn0_tloc01_shaping_rate
        shutdown_variable: vpn0_tloc01_if_shutdown
        tunnel_interface:
          allow_service_bgp: false
          allow_service_dhcp: true
          allow_service_dns: true
          allow_service_https: false
          allow_service_icmp: true
          allow_service_netconf: false
          allow_service_ntp: true
          allow_service_ospf: false
          allow_service_snmp: false
          allow_service_ssh: false
          allow_service_stun: false
          clear_dont_fragment: false
          color_variable: vpn0_tloc01_tunnel_color
          restrict_variable: vpn0_tloc01_tunnel_restrict
          ipsec_encapsulation: true
          ipsec_preference_variable: vpn0_tloc01_tunnel_ipsec_preference
          ipsec_weight_variable: vpn0_tloc01_tunnel_weight
          group_variable: vpn0_tloc01_tunnel_group
          hello_interval: 1000
          hello_tolerance: 12
          vmanage_connection_preference_variable: vpn0_tloc01_tunnel_vmanage_connection_preference
          propagate_sgt: true

      - name: FT-TLOC2-PRIVATE-REMOTE-VPN0
        description: CEDGE TLOC2 with static IP Settings
        interface_description_variable: vpn0_tloc02_if_description
        interface_name_variable: vpn0_tloc02_if_name
        ipv4_address_variable: vpn0_tloc02_if_ipv4_address
        ipv4_nat: false
        shaping_rate_variable: vpn0_tloc02_shaping_rate
        shutdown_variable: vpn0_tloc02_if_shutdown
        tunnel_interface:
          allow_service_bgp: false
          allow_service_dhcp: true
          allow_service_dns: true
          allow_service_https: false
          allow_service_icmp: true
          allow_service_netconf: false
          allow_service_ntp: true
          allow_service_ospf: false
          allow_service_snmp: false
          allow_service_ssh: false
          allow_service_stun: false
          clear_dont_fragment: false
          color_variable: vpn0_tloc02_tunnel_color
          restrict_variable: vpn0_tloc02_tunnel_restrict
          ipsec_encapsulation: true
          ipsec_preference_variable: vpn0_tloc02_tunnel_ipsec_preference
          ipsec_weight_variable: vpn0_tloc02_tunnel_weight
          group_variable: vpn0_tloc02_tunnel_group
          hello_interval: 1000
          hello_tolerance: 12
          vmanage_connection_preference_variable: vpn0_tloc02_tunnel_vmanage_connection_preference
          propagate_sgt: true

    omp_templates:
      - name: FT-REMOTE-EDGE-OMP-01
        description: OMP template to advertise connected and static routes
        ipv4_advertise_protocols:
          - connected
          - static
        graceful_restart: true
        graceful_restart_timer: 300
        send_path_limit: 4
        ecmp_limit: 4

    aaa_templates:
      - name: FT-REMOTE-EDGE-AAA-01
        description: CEDGE Local auth
        authentication_and_authorization_order:
          - local
        users:
          - name: admin
            optional: false
            password: $6$cfnMdfqC1k.h/ExF$SR9Gxdu.fvTdxWX4TTwblgZEoowe62ssto9NVw5qOHpZXbVhZvcRCJhOKRLMKatWcF9T4Nzer85Xfja3gh4QF/
            privilege_level: 15
            secret: $9$KBAJf3.Y/vGaLk$Vta72ZKRZZnQbvqtyKhvgSYnMrdtSavbT8bpZbpQ1Ew
          - name: failsafe
            optional: false
            password: $6$cfnMdfqC1k.h/ExF$SR9Gxdu.fvTdxWX4TTwblgZEoowe62ssto9NVw5qOHpZXbVhZvcRCJhOKRLMKatWcF9T4Nzer85Xfja3gh4QF/
            privilege_level: 15
            secret: $9$KBAJf3.Y/vGaLk$Vta72ZKRZZnQbvqtyKhvgSYnMrdtSavbT8bpZbpQ1Ew

    banner_templates:
      - name: FT-REMOTE-EDGE-BANNER-01
        description: Base banner template; support carrier returns
        login: "login banner: new\n"
        motd: "motd banner:\r\nNo message today\n"

    bfd_templates:
      - name: FT-REMOTE-EDGE-BFD-01
        description: BFD base template
        poll_interval: 30000
        multiplier: 4
        colors:
          - color: biz-internet
          - color: mpls

    cli_templates:
      - name: FT-REMOTE-EDGE-CLI-BASE-01
        description: "Edge CLI base; system + console only. BGP is now a proper bgp_template in multi-domain/sdwan/."
        cli_config: |
          system
            transport-gateway enable
          login on-failure log
          platform console serial
          ip bgp-community new-format
          bfd-template single-hop test
           interval min-tx 400 min-rx 400 multiplier 5
          interface GigabitEthernet3
            bfd template test

    global_settings_templates:
      - name: FT-REMOTE-EDGE-GLOBAL-01
        description: Base cEdge Global Settings
        cdp_variable: global_cdp_enable
        # domain_lookup_variable: global_ip_domain_lookup_enable
        lldp_variable: global_lldp_enable
    logging_templates:
      - name: FT-REMOTE-EDGE-LOGGING-01
        description: Base Logging template; no TLS
        ipv4_servers:
          - hostname_ip: 192.168.0.25
            logging_level: warn
            source_interface_variable: logging_server_source_interface
            vpn_id: 30
          - hostname_ip: 192.168.0.26
            logging_level: warn
            source_interface_variable: logging_server_source_interface
            vpn_id: 30

    ntp_templates:
      - name: FT-REMOTE-EDGE-NTP-01
        description: Base NTP template; no auth key; no ntp master
        servers:
          - hostname_ip: 216.239.35.4
            prefer: true
            source_interface_variable: ntp_server_source_interface
            vpn_id: 30
          - hostname_ip: time-pnp.cisco.com
            prefer: false
            source_interface_variable: ntp_server_source_interface
            vpn_id: 30

    security_templates:
      - name: FT-REMOTE-EDGE-SECURITY-01
        description: Base SD-WAN data-plane security
        rekey_interval: 172800

    snmp_templates:
      - name: FT-REMOTE-EDGE-SNMPV3-01
        description: SNMPv3 template
        contact_variable: snmp_contact
        groups:
          - name: GROUP_NOAUTH_NOPRIV
            security_level: no-auth-no-priv
            view: VIEW_ALL
          - name: GROUP_AUTH_NOPRIV
            security_level: auth-no-priv
            view: VIEW_ALL
          - name: GROUP_AUTH_PRIV
            security_level: auth-priv
            view: VIEW_ALL
        location_variable: snmp_location
        shutdown_variable: snmp_shutdown
        trap_target_servers:
          - ip: 172.16.0.11
            udp_port: 514
            community_name: $CRYPT_CLUSTER$MVeouqBXy9Od6dAYMJ6eTQ==$z0Pl/8UAxXkt1lXOnayv8A==
            source_interface_variable: snmp_trap_source_interface
            user: user01
            vpn_id: 30
        users:
          - name: user01
            group: GROUP_NOAUTH_NOPRIV
          - name: user02
            group: GROUP_AUTH_NOPRIV
            authentication_protocol: sha
            authentication_password: $CRYPT_CLUSTER$GU+PR6WV3va2QY07wG6Z6w==$INccS/tPm4BdiwzuP6lUJw==
          - name: user03
            group: GROUP_AUTH_PRIV
            authentication_protocol: sha
            authentication_password: $CRYPT_CLUSTER$GU+PR6WV3va2QY07wG6Z6w==$INccS/tPm4BdiwzuP6lUJw==
            privacy_protocol: aes-cfb-128
            privacy_password: $CRYPT_CLUSTER$GU+PR6WV3va2QY07wG6Z6w==$INccS/tPm4BdiwzuP6lUJw==
        views:
          - name: VIEW_ALL
            oids:
              - id: "1.3"
                exclude: false
          - name: VIEW_ALL2
            oids:
              - id: "1.3"
                exclude: false

    system_templates:
      - name: FT-REMOTE-EDGE-SYSTEM-01
        description: Base Cisco System template
        timezone_variable: timezone
        system_description_variable: system_description
        latitude_variable: system_latitude
        longitude_variable: system_longitude
        hostname_variable: system_hostname
        console_baud_rate: 9600
        idle_timeout: 300
        location_variable: system_location
        on_demand_tunnel_variable: ondemand_tunnel_enable
        on_demand_tunnel_idle_timeout_variable: ondemand_tunnel_idle_timeout
        site_id_variable: site_id
        system_ip_variable: system_ip
        controller_groups_variable: controller_groups
